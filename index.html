    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #fbf6ed;
            --bg-pattern:   rgba(180, 130, 60, 0.04);
            --surface:      #ffffff;
            --surface-2:    #f7efe0;
            --surface-3:    #f1e6d0;
            --border:       #e6d5b0;
            --border-soft:  #efe2c5;
            --text:         #2a1a08;
            --text-soft:    #5a3e22;
            --text-muted:   #7a6040;
            --primary:      #b27a2a;
            --primary-dark: #8a5a18;
            --primary-soft: #fdf3df;
            --accent:       #4a2c0a;
            --cold:         #1f5a96;
            --cold-soft:    #dce9f5;
            --warm:         #b83225;
            --warm-soft:    #fbe8e3;
            --success:      #3a6848;
            --success-soft: #d8ede0;
            --warning:      #a8660e;
            --warning-soft: #fcefd7;
            --danger:       #9e3333;
            --danger-soft:  #fbe5e3;
            --shadow-sm:    0 1px 2px rgba(74,44,10,0.06);
            --shadow-md:    0 4px 16px rgba(74,44,10,0.10);
            --shadow-lg:    0 8px 32px rgba(74,44,10,0.14);
            --radius:       14px;
            --radius-sm:    8px;
        }

        [data-theme="dark"] {
            --bg:           #1a140d;
            --bg-pattern:   rgba(255, 200, 100, 0.03);
            --surface:      #241c12;
            --surface-2:    #2d2418;
            --surface-3:    #3a2e1f;
            --border:       #5a4530;
            --border-soft:  #4a3828;
            --text:         #f5e6c8;
            --text-soft:    #d4b988;
            --text-muted:   #a8926a;
            --primary:      #e0a85a;
            --primary-dark: #b27a2a;
            --primary-soft: #3a2e1a;
            --accent:       #f5e6c8;
            --cold:         #7ab4e0;
            --cold-soft:    #1a2a3d;
            --warm:         #e8786a;
            --warm-soft:    #3a1e18;
            --success:      #8fca9e;
            --success-soft: #172718;
            --warning:      #e8b060;
            --warning-soft: #322410;
            --danger:       #e87c76;
            --danger-soft:  #361616;
            --shadow-sm:    0 1px 2px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 16px rgba(0,0,0,0.35);
            --shadow-lg:    0 8px 32px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, var(--bg-pattern), transparent 70%),
                radial-gradient(ellipse 60% 60% at 80% 100%, var(--bg-pattern), transparent 70%);
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .serif { font-family: 'Fraunces', serif; }

        .app-header {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .brand { display: flex; align-items: center; gap: 0.85rem; }
        .brand-mark {
            width: 44px; height: 44px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif;
            font-weight: 700; font-size: 1.25rem; font-style: italic;
        }
        [data-theme="dark"] .brand-mark { background: var(--primary); color: #1a140d; }
        .brand-text h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem; font-weight: 500;
            letter-spacing: -0.01em; line-height: 1.1;
        }
        .brand-text p {
            font-size: 0.78rem; color: var(--text-soft);
            text-transform: uppercase; letter-spacing: 0.12em;
            margin-top: 0.15rem;
        }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-soft);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem; font-family: inherit; font-weight: 500;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.15s;
        }
        .icon-btn:hover {
            background: var(--surface-2); color: var(--text);
            border-color: var(--text-muted);
        }
        .icon-btn svg { width: 16px; height: 16px; }

        .app-body { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

        .hero-strip {
            background: var(--accent);
            color: var(--bg);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        [data-theme="dark"] .hero-strip {
            background: linear-gradient(135deg, #2d2418 0%, #3a2e1f 100%);
            border: 1px solid var(--border);
        }
        .hero-strip::before {
            content: '';
            position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 9px);
            pointer-events: none;
        }
        .hero-stat { position: relative; z-index: 1; }
        .hero-stat .label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.75);
            margin-bottom: 0.25rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .label {
            color: var(--text-muted);
        }
        .hero-stat .value {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem; font-weight: 500;
            letter-spacing: -0.02em; line-height: 1;
            color: #fff;
        }
        [data-theme="dark"] .hero-strip .hero-stat .value {
            color: var(--text);
        }
        .hero-stat .unit {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-left: 0.15rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .unit {
            color: var(--text-muted);
        }

        .presets-row {
            display: flex; gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            scrollbar-width: thin;
        }
        .presets-row::-webkit-scrollbar { height: 4px; }
        .presets-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .preset-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.45rem 0.95rem;
            cursor: pointer;
            font-family: inherit; font-size: 0.83rem; font-weight: 500;
            color: var(--text-soft);
            transition: all 0.15s;
            white-space: nowrap;
            display: flex; align-items: center; gap: 0.35rem;
            flex-shrink: 0;
        }
        .preset-btn:hover {
            border-color: var(--primary); color: var(--primary-dark);
            background: var(--primary-soft);
        }
        .preset-btn.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .preset-btn.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }

        .two-col {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .section { margin-bottom: 1.75rem; }
        .section:last-child { margin-bottom: 0; }
        .section-label {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 0.85rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .step-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--primary-soft); color: var(--primary-dark);
            border-radius: 50%;
            font-size: 0.75rem; font-weight: 700;
            font-family: 'Inter', sans-serif;
        }

        .dough-toggle {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(115px, 1fr));
            gap: 0.5rem;
        }
        @media (max-width: 500px) {
            .dough-toggle { grid-template-columns: repeat(2, 1fr); }
        }
        .dough-btn {
            padding: 0.7rem 0.55rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer; font-family: inherit;
            transition: all 0.18s;
            display: flex; flex-direction: column;
            align-items: flex-start; gap: 0.15rem; text-align: left;
            color: var(--text);
        }
        .dough-btn:hover { border-color: var(--primary); background: var(--primary-soft); }
        .dough-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
        [data-theme="dark"] .dough-btn.active { background: var(--primary); border-color: var(--primary); color: #1a140d; }
        .dough-btn .top {
            display: flex; align-items: center; gap: 0.35rem;
            font-weight: 600; font-size: 0.85rem;
        }
        .dough-btn .emoji { font-size: 1.2rem; }
        .dough-btn .sub { font-size: 0.66rem; opacity: 0.75; font-weight: 400; line-height: 1.3; }

        /* Panettone-specific */
        .pan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .pan-mold-btn {
            padding: 0.6rem 0.5rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 0.78rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            color: var(--text-soft); font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; gap: 0.15rem; text-align: center;
        }
        .pan-mold-btn:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-soft); }
        .pan-mold-btn.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .pan-mold-btn.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }
        .pan-mold-btn .ms {
            font-size: 0.66rem; opacity: 0.75;
            font-variant-numeric: tabular-nums;
        }
        .pan-mold-btn.active .ms { opacity: 0.85; }

        .ph-pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: var(--cold-soft); color: var(--cold);
            font-size: 0.72rem; font-weight: 600;
            padding: 0.15rem 0.55rem; border-radius: 999px;
            font-variant-numeric: tabular-nums;
            border: 1px solid var(--cold);
        }
        .ph-pill.warn { background: var(--warning-soft); color: var(--warning); border-color: var(--warning); }
        .ph-pill.ok { background: var(--success-soft); color: var(--success); border-color: var(--success); }

        .recipe-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.83rem;
            margin-bottom: 0.75rem;
        }
        .recipe-table th, .recipe-table td {
            padding: 0.45rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-soft);
        }
        .recipe-table th {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            font-weight: 700;
            background: var(--surface-2);
        }
        .recipe-table td {
            color: var(--text);
        }
        .recipe-table td.qty {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }
        [data-theme="dark"] .recipe-table td.qty { color: var(--primary); }
        .recipe-table td.note {
            font-size: 0.74rem;
            color: var(--text-soft);
            font-style: italic;
        }
        .recipe-table tr.subtotal td {
            background: var(--surface-2);
            font-weight: 700;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
        }
        [data-theme="dark"] .recipe-table tr.subtotal td { color: var(--primary); }

        .phase-card {
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 1rem 1.15rem;
            margin-bottom: 0.85rem;
        }
        .phase-card-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.65rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border-soft);
        }
        .phase-card-title {
            font-family: 'Fraunces', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            display: flex; align-items: center; gap: 0.45rem;
        }
        .phase-day {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            font-weight: 600;
        }

        .checklist {
            list-style: none;
            display: flex; flex-direction: column;
            gap: 0.35rem;
        }
        .checklist li {
            display: flex; align-items: flex-start; gap: 0.55rem;
            padding: 0.45rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.84rem;
            line-height: 1.4;
        }
        .checklist li:hover { background: var(--surface-2); }
        .checklist li.done {
            color: var(--text-soft);
            text-decoration: line-through;
            opacity: 0.7;
        }
        .check-box {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.15s;
            background: var(--surface);
        }
        .checklist li.done .check-box {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        .check-day {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
            min-width: 70px;
            flex-shrink: 0;
        }

        .danger-box {
            background: var(--danger-soft);
            border-left: 3px solid var(--danger);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 0.7rem 0.95rem;
            font-size: 0.82rem;
            color: var(--text);
            margin-bottom: 0.6rem;
        }
        .danger-box-title {
            font-weight: 700; color: var(--danger);
            margin-bottom: 0.25rem;
            display: flex; align-items: center; gap: 0.35rem;
        }

        .accordion {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .accordion-header {
            padding: 0.7rem 0.95rem;
            background: var(--surface-2);
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }
        .accordion-header:hover { background: var(--surface-3); }
        .accordion-header .arrow {
            transition: transform 0.2s;
            color: var(--text-soft);
        }
        .accordion.open .accordion-header .arrow { transform: rotate(90deg); }
        .accordion-body {
            padding: 0 0.95rem 0.85rem;
            font-size: 0.82rem;
            color: var(--text-soft);
            line-height: 1.55;
        }

        .slider-group { display: flex; flex-direction: column; gap: 1.1rem; }
        .slider-row { display: flex; flex-direction: column; gap: 0.45rem; }
        .slider-label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.85rem; font-weight: 500;
        }
        .slider-label.disabled { opacity: 0.45; }
        .slider-label-left {
            display: flex; align-items: center; gap: 0.45rem;
            color: var(--text);
        }
        .slider-label-left .ic {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--surface-2); border-radius: 6px;
            font-size: 0.95rem;
        }
        .slider-value-pill {
            background: var(--accent); color: var(--bg);
            font-size: 0.82rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 999px;
            min-width: 60px; text-align: center;
            font-variant-numeric: tabular-nums;
        }
