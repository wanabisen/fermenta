    <meta name="description" content="Calculadora artesanal de fermentación: calcula levadura, hidratación, tiempos y plan de horneado para pan y pizza.">
    <title>Calculadora de Fermentación · Panadería Artesanal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #fbf6ed;
            --bg-pattern:   rgba(180, 130, 60, 0.04);
            --surface:      #ffffff;
            --surface-2:    #f7efe0;
            --surface-3:    #f1e6d0;
            --border:       #e6d5b0;
            --border-soft:  #efe2c5;
            --text:         #2a1a08;
            --text-soft:    #5a3e22;
            --text-muted:   #7a6040;
            --primary:      #b27a2a;
            --primary-dark: #8a5a18;
            --primary-soft: #fdf3df;
            --accent:       #4a2c0a;
            --cold:         #1f5a96;
            --cold-soft:    #dce9f5;
            --warm:         #b83225;
            --warm-soft:    #fbe8e3;
            --success:      #3a6848;
            --success-soft: #d8ede0;
            --warning:      #a8660e;
            --warning-soft: #fcefd7;
            --danger:       #9e3333;
            --danger-soft:  #fbe5e3;
            --shadow-sm:    0 1px 2px rgba(74,44,10,0.06);
            --shadow-md:    0 4px 16px rgba(74,44,10,0.10);
            --shadow-lg:    0 8px 32px rgba(74,44,10,0.14);
            --radius:       14px;
            --radius-sm:    8px;
        }

        [data-theme="dark"] {
            --bg:           #1a140d;
            --bg-pattern:   rgba(255, 200, 100, 0.03);
            --surface:      #241c12;
            --surface-2:    #2d2418;
            --surface-3:    #3a2e1f;
            --border:       #5a4530;
            --border-soft:  #4a3828;
            --text:         #f5e6c8;
            --text-soft:    #d4b988;
            --text-muted:   #a8926a;
            --primary:      #e0a85a;
            --primary-dark: #b27a2a;
            --primary-soft: #3a2e1a;
            --accent:       #f5e6c8;
            --cold:         #7ab4e0;
            --cold-soft:    #1a2a3d;
            --warm:         #e8786a;
            --warm-soft:    #3a1e18;
            --success:      #8fca9e;
            --success-soft: #172718;
            --warning:      #e8b060;
            --warning-soft: #322410;
            --danger:       #e87c76;
            --danger-soft:  #361616;
            --shadow-sm:    0 1px 2px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 16px rgba(0,0,0,0.35);
            --shadow-lg:    0 8px 32px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, var(--bg-pattern), transparent 70%),
                radial-gradient(ellipse 60% 60% at 80% 100%, var(--bg-pattern), transparent 70%);
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .serif { font-family: 'Fraunces', serif; }

        .app-header {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .brand { display: flex; align-items: center; gap: 0.85rem; }
        .brand-mark {
            width: 44px; height: 44px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif;
            font-weight: 700; font-size: 1.25rem; font-style: italic;
        }
        [data-theme="dark"] .brand-mark { background: var(--primary); color: #1a140d; }
        .brand-text h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem; font-weight: 500;
            letter-spacing: -0.01em; line-height: 1.1;
        }
        .brand-text p {
            font-size: 0.78rem; color: var(--text-soft);
            text-transform: uppercase; letter-spacing: 0.12em;
            margin-top: 0.15rem;
        }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-soft);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem; font-family: inherit; font-weight: 500;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.15s;
        }
        .icon-btn:hover {
            background: var(--surface-2); color: var(--text);
            border-color: var(--text-muted);
        }
        .icon-btn svg { width: 16px; height: 16px; }

        .app-body { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

        .hero-strip {
            background: var(--accent);
            color: var(--bg);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        [data-theme="dark"] .hero-strip {
            background: linear-gradient(135deg, #2d2418 0%, #3a2e1f 100%);
            border: 1px solid var(--border);
        }
        .hero-strip::before {
            content: '';
            position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 9px);
            pointer-events: none;
        }
        .hero-stat { position: relative; z-index: 1; }
        .hero-stat .label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.75);
            margin-bottom: 0.25rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .label {
            color: var(--text-muted);
        }
        .hero-stat .value {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem; font-weight: 500;
            letter-spacing: -0.02em; line-height: 1;
            color: #fff;
        }
        [data-theme="dark"] .hero-strip .hero-stat .value {
            color: var(--text);
        }
        .hero-stat .unit {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-left: 0.15rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .unit {
            color: var(--text-muted);
        }

        .presets-row {
            display: flex; gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            scrollbar-width: thin;
        }
        .presets-row::-webkit-scrollbar { height: 4px; }
        .presets-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .preset-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.45rem 0.95rem;
            cursor: pointer;
            font-family: inherit; font-size: 0.83rem; font-weight: 500;
            color: var(--text-soft);
            transition: all 0.15s;
            white-space: nowrap;
            display: flex; align-items: center; gap: 0.35rem;
            flex-shrink: 0;
        }
        .preset-btn:hover {
            border-color: var(--primary); color: var(--primary-dark);
            background: var(--primary-soft);
        }
        .preset-btn.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .preset-btn.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }

        .two-col {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .section { margin-bottom: 1.75rem; }
        .section:last-child { margin-bottom: 0; }
        .section-label {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 0.85rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .step-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--primary-soft); color: var(--primary-dark);
            border-radius: 50%;
            font-size: 0.75rem; font-weight: 700;
            font-family: 'Inter', sans-serif;
        }

        .dough-toggle {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
        }
        .dough-btn {
            padding: 1rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer; font-family: inherit;
            transition: all 0.18s;
            display: flex; flex-direction: column;
            align-items: flex-start; gap: 0.2rem; text-align: left;
            color: var(--text);
        }
        .dough-btn:hover { border-color: var(--primary); background: var(--primary-soft); }
        .dough-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
        [data-theme="dark"] .dough-btn.active { background: var(--primary); border-color: var(--primary); color: #1a140d; }
        .dough-btn .top {
            display: flex; align-items: center; gap: 0.5rem;
            font-weight: 600; font-size: 0.95rem;
        }
        .dough-btn .emoji { font-size: 1.4rem; }
        .dough-btn .sub { font-size: 0.72rem; opacity: 0.7; font-weight: 400; }

        .slider-group { display: flex; flex-direction: column; gap: 1.1rem; }
        .slider-row { display: flex; flex-direction: column; gap: 0.45rem; }
        .slider-label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.85rem; font-weight: 500;
        }
        .slider-label.disabled { opacity: 0.45; }
        .slider-label-left {
            display: flex; align-items: center; gap: 0.45rem;
            color: var(--text);
        }
        .slider-label-left .ic {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--surface-2); border-radius: 6px;
            font-size: 0.95rem;
        }
        .slider-value-pill {
            background: var(--accent); color: var(--bg);
            font-size: 0.82rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 999px;
            min-width: 60px; text-align: center;
            font-variant-numeric: tabular-nums;
        }
        [data-theme="dark"] .slider-value-pill { background: var(--primary); color: #1a140d; }
        .slider-value-pill.disabled { background: var(--text-muted); }

        .slider-track { display: flex; align-items: center; gap: 0.6rem; }
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            flex: 1; height: 4px; border-radius: 4px;
            background: var(--border); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--surface);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--surface);
            cursor: pointer;
        }
        input[type="range"]:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="number"], input[type="time"], input[type="text"] {
            font-family: inherit; font-size: 0.85rem;
            padding: 0.35rem 0.55rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface); color: var(--text);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        input[type="number"] { width: 64px; }
        input[type="number"]:disabled { opacity: 0.4; }

        .slider-hint {
            font-size: 0.74rem; color: var(--text-soft);
            margin-top: -0.15rem; font-style: italic;
        }
        .slider-warning {
            font-size: 0.74rem; color: var(--warning);
            margin-top: 0.15rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.3rem;
        }

        .pref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.5rem;
        }
        .pref-pill {
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 0.83rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            color: var(--text-soft); font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; gap: 0.15rem; text-align: center;
        }
        .pref-pill:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-soft); }
        .pref-pill.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .pref-pill.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }
        .pref-pill .e { font-size: 1.1rem; }
        .pref-pill .h {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 500; font-variant-numeric: tabular-nums;
        }
        .pref-pill.active .h { color: rgba(255,255,255,0.75); }
        [data-theme="dark"] .pref-pill.active .h { color: rgba(26,20,13,0.7); }

        .pref-info {
            margin-top: 0.85rem;
            padding: 0.85rem 1rem;
            background: var(--primary-soft);
            border-left: 3px solid var(--primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.85rem; color: var(--text-soft);
            line-height: 1.55;
        }
        .pref-info-title {
            display: flex; justify-content: space-between;
            margin-bottom: 0.4rem;
            font-weight: 600; color: var(--accent);
            font-family: 'Fraunces', serif; font-size: 0.95rem;
        }
        [data-theme="dark"] .pref-info-title { color: var(--primary); }
        .pref-info-meta {
            display: flex; gap: 0.35rem; font-size: 0.7rem;
        }
        .pref-info-meta span {
            background: var(--accent); color: var(--bg);
            padding: 0.1rem 0.5rem; border-radius: 999px;
            font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        [data-theme="dark"] .pref-info-meta span { background: var(--primary); color: #1a140d; }
        .pref-info-tip {
            margin-top: 0.5rem; font-size: 0.78rem; color: var(--success);
            display: flex; align-items: flex-start; gap: 0.35rem;
            font-weight: 500;
        }
        .pref-info-flavor {
            margin-top: 0.3rem; font-size: 0.78rem;
            font-style: italic; color: var(--text-soft);
        }

        .toggle-row {
            display: flex; align-items: center;
            justify-content: space-between; gap: 0.75rem;
            padding: 0.6rem 0.85rem;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
        }
        .toggle-label {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.88rem; font-weight: 500; color: var(--text);
        }
        .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 24px; cursor: pointer;
            transition: 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            left: 3px; top: 3px;
            background: white; border-radius: 50%;
            transition: 0.2s; box-shadow: var(--shadow-sm);
        }
        input:checked + .toggle-slider { background: var(--cold); }
        input:checked + .toggle-slider::before { transform: translateX(20px); }

        .indent-group {
            padding-left: 1rem;
            border-left: 2px solid var(--border-soft);
            margin-top: 0.85rem;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .tabs {
            display: flex; gap: 0.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }
        .tab {
            background: transparent; border: none;
            padding: 0.6rem 1rem;
            cursor: pointer; font-family: inherit;
            font-size: 0.88rem; font-weight: 500;
            color: var(--text-soft);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        [data-theme="dark"] .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .ing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.6rem; margin-bottom: 1rem;
        }
        .ing-card {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: 0.85rem 0.75rem;
            text-align: center;
        }
        .ing-card .l {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-soft);
            margin-bottom: 0.35rem; font-weight: 600;
        }
        .ing-card .v {
            font-family: 'Fraunces', serif;
            font-size: 1.65rem; font-weight: 500;
            color: var(--text); line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .ing-card .u {
            font-size: 0.72rem; color: var(--text-soft);
            margin-top: 0.15rem;
        }

        .yeast-card {
            background: var(--success-soft);
            border: 1px solid var(--success);
            border-radius: var(--radius-sm);
            padding: 1rem; text-align: center;
            margin-bottom: 1rem;
        }
        .yeast-card .l {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--success); font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .yeast-card .v {
            font-family: 'Fraunces', serif;
            font-size: 2.2rem; font-weight: 500;
            color: var(--text); line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .yeast-card .u {
            font-size: 0.75rem; color: var(--text-soft);
            margin-top: 0.25rem;
        }
        .yeast-card .tiny {
            font-size: 0.7rem; color: var(--text-soft);
            margin-top: 0.45rem; padding-top: 0.45rem;
            border-top: 1px dashed var(--border);
        }

        .schedule-input {
            display: flex; align-items: center;
            justify-content: space-between;
            background: var(--surface-2);
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
        }
        .schedule-input label {
            font-size: 0.83rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .schedule {
            background: var(--surface-2);
            border-radius: var(--radius);
            padding: 0.5rem;
            margin-bottom: 1rem;
        }
        .schedule-row {
            display: grid;
            grid-template-columns: 70px 1fr auto;
            gap: 0.75rem; align-items: center;
            padding: 0.7rem 0.85rem;
            border-radius: var(--radius-sm);
            transition: background 0.15s;
        }
        .schedule-row + .schedule-row { margin-top: 0.2rem; }
        .schedule-row:hover { background: var(--surface); }
        .schedule-time {
            font-family: 'Fraunces', serif;
            font-size: 1.05rem; font-weight: 500;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }
        [data-theme="dark"] .schedule-time { color: var(--primary); }
        .schedule-step {
            display: flex; flex-direction: column;
            gap: 0.1rem; min-width: 0;
        }
        .schedule-step .name {
            font-weight: 600; font-size: 0.92rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .schedule-step .ic {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px;
            background: var(--surface);
            border-radius: 50%;
            font-size: 0.95rem; flex-shrink: 0;
        }
        .schedule-step .desc {
            font-size: 0.78rem; color: var(--text-soft);
            padding-left: 32px;
        }
        .schedule-duration {
            font-size: 0.78rem; color: var(--text-soft);
            font-variant-numeric: tabular-nums; white-space: nowrap;
        }
        .schedule-row.cold { background: var(--cold-soft); }
        .schedule-row.cold .schedule-time { color: var(--cold); }
        .schedule-row.cold .schedule-step .desc,
        .schedule-row.cold .schedule-duration { color: var(--text-soft); }
        .schedule-row.bake { background: var(--warm-soft); }
