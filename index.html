    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora artesanal de fermentación: calcula levadura, hidratación, tiempos y plan de horneado para pan y pizza.">
    <title>Calculadora de Fermentación · Panadería Artesanal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #fbf6ed;
            --bg-pattern:   rgba(180, 130, 60, 0.04);
            --surface:      #ffffff;
            --surface-2:    #f7efe0;
            --surface-3:    #f1e6d0;
            --border:       #e6d5b0;
            --border-soft:  #efe2c5;
            --text:         #2a1a08;
            --text-soft:    #5a3e22;
            --text-muted:   #7a6040;
            --primary:      #b27a2a;
            --primary-dark: #8a5a18;
            --primary-soft: #fdf3df;
            --accent:       #4a2c0a;
            --cold:         #1f5a96;
            --cold-soft:    #dce9f5;
            --warm:         #b83225;
            --warm-soft:    #fbe8e3;
            --success:      #3a6848;
            --success-soft: #d8ede0;
            --warning:      #a8660e;
            --warning-soft: #fcefd7;
            --danger:       #9e3333;
            --danger-soft:  #fbe5e3;
            --shadow-sm:    0 1px 2px rgba(74,44,10,0.06);
            --shadow-md:    0 4px 16px rgba(74,44,10,0.10);
            --shadow-lg:    0 8px 32px rgba(74,44,10,0.14);
            --radius:       14px;
            --radius-sm:    8px;
        }

        [data-theme="dark"] {
            --bg:           #1a140d;
            --bg-pattern:   rgba(255, 200, 100, 0.03);
            --surface:      #241c12;
            --surface-2:    #2d2418;
            --surface-3:    #3a2e1f;
            --border:       #5a4530;
            --border-soft:  #4a3828;
            --text:         #f5e6c8;
            --text-soft:    #d4b988;
            --text-muted:   #a8926a;
            --primary:      #e0a85a;
            --primary-dark: #b27a2a;
            --primary-soft: #3a2e1a;
            --accent:       #f5e6c8;
            --cold:         #7ab4e0;
            --cold-soft:    #1a2a3d;
            --warm:         #e8786a;
            --warm-soft:    #3a1e18;
            --success:      #8fca9e;
            --success-soft: #172718;
            --warning:      #e8b060;
            --warning-soft: #322410;
            --danger:       #e87c76;
            --danger-soft:  #361616;
            --shadow-sm:    0 1px 2px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 16px rgba(0,0,0,0.35);
            --shadow-lg:    0 8px 32px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% 0%, var(--bg-pattern), transparent 70%),
                radial-gradient(ellipse 60% 60% at 80% 100%, var(--bg-pattern), transparent 70%);
            transition: background 0.3s, color 0.3s;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .serif { font-family: 'Fraunces', serif; }

        .app-header {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .brand { display: flex; align-items: center; gap: 0.85rem; }
        .brand-mark {
            width: 44px; height: 44px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif;
            font-weight: 700; font-size: 1.25rem; font-style: italic;
        }
        [data-theme="dark"] .brand-mark { background: var(--primary); color: #1a140d; }
        .brand-text h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem; font-weight: 500;
            letter-spacing: -0.01em; line-height: 1.1;
        }
        .brand-text p {
            font-size: 0.78rem; color: var(--text-soft);
            text-transform: uppercase; letter-spacing: 0.12em;
            margin-top: 0.15rem;
        }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-soft);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem; font-family: inherit; font-weight: 500;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.15s;
        }
        .icon-btn:hover {
            background: var(--surface-2); color: var(--text);
            border-color: var(--text-muted);
        }
        .icon-btn svg { width: 16px; height: 16px; }

        .app-body { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

        .hero-strip {
            background: var(--accent);
            color: var(--bg);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        [data-theme="dark"] .hero-strip {
            background: linear-gradient(135deg, #2d2418 0%, #3a2e1f 100%);
            border: 1px solid var(--border);
        }
        .hero-strip::before {
            content: '';
            position: absolute; inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 9px);
            pointer-events: none;
        }
        .hero-stat { position: relative; z-index: 1; }
        .hero-stat .label {
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.75);
            margin-bottom: 0.25rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .label {
            color: var(--text-muted);
        }
        .hero-stat .value {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem; font-weight: 500;
            letter-spacing: -0.02em; line-height: 1;
            color: #fff;
        }
        [data-theme="dark"] .hero-strip .hero-stat .value {
            color: var(--text);
        }
        .hero-stat .unit {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-left: 0.15rem;
        }
        [data-theme="dark"] .hero-strip .hero-stat .unit {
            color: var(--text-muted);
        }

        .presets-row {
            display: flex; gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            scrollbar-width: thin;
        }
        .presets-row::-webkit-scrollbar { height: 4px; }
        .presets-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .preset-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.45rem 0.95rem;
            cursor: pointer;
            font-family: inherit; font-size: 0.83rem; font-weight: 500;
            color: var(--text-soft);
            transition: all 0.15s;
            white-space: nowrap;
            display: flex; align-items: center; gap: 0.35rem;
            flex-shrink: 0;
        }
        .preset-btn:hover {
            border-color: var(--primary); color: var(--primary-dark);
            background: var(--primary-soft);
        }
        .preset-btn.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .preset-btn.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }

        .two-col {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .section { margin-bottom: 1.75rem; }
        .section:last-child { margin-bottom: 0; }
        .section-label {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 0.85rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .step-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--primary-soft); color: var(--primary-dark);
            border-radius: 50%;
            font-size: 0.75rem; font-weight: 700;
            font-family: 'Inter', sans-serif;
        }

        .dough-toggle {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(115px, 1fr));
            gap: 0.5rem;
        }
        @media (max-width: 500px) {
            .dough-toggle { grid-template-columns: repeat(2, 1fr); }
        }
        .dough-btn {
            padding: 0.7rem 0.55rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            cursor: pointer; font-family: inherit;
            transition: all 0.18s;
            display: flex; flex-direction: column;
            align-items: flex-start; gap: 0.15rem; text-align: left;
            color: var(--text);
        }
        .dough-btn:hover { border-color: var(--primary); background: var(--primary-soft); }
        .dough-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
        [data-theme="dark"] .dough-btn.active { background: var(--primary); border-color: var(--primary); color: #1a140d; }
        .dough-btn .top {
            display: flex; align-items: center; gap: 0.35rem;
            font-weight: 600; font-size: 0.85rem;
        }
        .dough-btn .emoji { font-size: 1.2rem; }
        .dough-btn .sub { font-size: 0.66rem; opacity: 0.75; font-weight: 400; line-height: 1.3; }

        /* Panettone-specific */
        .pan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .pan-mold-btn {
            padding: 0.6rem 0.5rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 0.78rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            color: var(--text-soft); font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; gap: 0.15rem; text-align: center;
        }
        .pan-mold-btn:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-soft); }
        .pan-mold-btn.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .pan-mold-btn.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }
        .pan-mold-btn .ms {
            font-size: 0.66rem; opacity: 0.75;
            font-variant-numeric: tabular-nums;
        }
        .pan-mold-btn.active .ms { opacity: 0.85; }

        .ph-pill {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: var(--cold-soft); color: var(--cold);
            font-size: 0.72rem; font-weight: 600;
            padding: 0.15rem 0.55rem; border-radius: 999px;
            font-variant-numeric: tabular-nums;
            border: 1px solid var(--cold);
        }
        .ph-pill.warn { background: var(--warning-soft); color: var(--warning); border-color: var(--warning); }
        .ph-pill.ok { background: var(--success-soft); color: var(--success); border-color: var(--success); }

        .recipe-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.83rem;
            margin-bottom: 0.75rem;
        }
        .recipe-table th, .recipe-table td {
            padding: 0.45rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-soft);
        }
        .recipe-table th {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            font-weight: 700;
            background: var(--surface-2);
        }
        .recipe-table td {
            color: var(--text);
        }
        .recipe-table td.qty {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }
        [data-theme="dark"] .recipe-table td.qty { color: var(--primary); }
        .recipe-table td.note {
            font-size: 0.74rem;
            color: var(--text-soft);
            font-style: italic;
        }
        .recipe-table tr.subtotal td {
            background: var(--surface-2);
            font-weight: 700;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
        }
        [data-theme="dark"] .recipe-table tr.subtotal td { color: var(--primary); }

        .phase-card {
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 1rem 1.15rem;
            margin-bottom: 0.85rem;
        }
        .phase-card-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.65rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border-soft);
        }
        .phase-card-title {
            font-family: 'Fraunces', serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            display: flex; align-items: center; gap: 0.45rem;
        }
        .phase-day {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-soft);
            font-weight: 600;
        }

        .checklist {
            list-style: none;
            display: flex; flex-direction: column;
            gap: 0.35rem;
        }
        .checklist li {
            display: flex; align-items: flex-start; gap: 0.55rem;
            padding: 0.45rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.84rem;
            line-height: 1.4;
        }
        .checklist li:hover { background: var(--surface-2); }
        .checklist li.done {
            color: var(--text-soft);
            text-decoration: line-through;
            opacity: 0.7;
        }
        .check-box {
            display: inline-flex; align-items: center; justify-content: center;
            width: 18px; height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.15s;
            background: var(--surface);
        }
        .checklist li.done .check-box {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        .check-day {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 700;
            min-width: 70px;
            flex-shrink: 0;
        }

        .danger-box {
            background: var(--danger-soft);
            border-left: 3px solid var(--danger);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            padding: 0.7rem 0.95rem;
            font-size: 0.82rem;
            color: var(--text);
            margin-bottom: 0.6rem;
        }
        .danger-box-title {
            font-weight: 700; color: var(--danger);
            margin-bottom: 0.25rem;
            display: flex; align-items: center; gap: 0.35rem;
        }

        .accordion {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .accordion-header {
            padding: 0.7rem 0.95rem;
            background: var(--surface-2);
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
            gap: 0.5rem;
        }
        .accordion-header:hover { background: var(--surface-3); }
        .accordion-header .arrow {
            transition: transform 0.2s;
            color: var(--text-soft);
        }
        .accordion.open .accordion-header .arrow { transform: rotate(90deg); }
        .accordion-body {
            padding: 0 0.95rem 0.85rem;
            font-size: 0.82rem;
            color: var(--text-soft);
            line-height: 1.55;
        }

        .slider-group { display: flex; flex-direction: column; gap: 1.1rem; }
        .slider-row { display: flex; flex-direction: column; gap: 0.45rem; }
        .slider-label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.85rem; font-weight: 500;
        }
        .slider-label.disabled { opacity: 0.45; }
        .slider-label-left {
            display: flex; align-items: center; gap: 0.45rem;
            color: var(--text);
        }
        .slider-label-left .ic {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px;
            background: var(--surface-2); border-radius: 6px;
            font-size: 0.95rem;
        }
        .slider-value-pill {
            background: var(--accent); color: var(--bg);
            font-size: 0.82rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 999px;
            min-width: 60px; text-align: center;
            font-variant-numeric: tabular-nums;
        }
        [data-theme="dark"] .slider-value-pill { background: var(--primary); color: #1a140d; }
        .slider-value-pill.disabled { background: var(--text-muted); }

        .slider-track { display: flex; align-items: center; gap: 0.6rem; }
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            flex: 1; height: 4px; border-radius: 4px;
            background: var(--border); outline: none; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--surface);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.15s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="range"]::-moz-range-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--surface);
            cursor: pointer;
        }
        input[type="range"]:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="number"], input[type="time"], input[type="text"] {
            font-family: inherit; font-size: 0.85rem;
            padding: 0.35rem 0.55rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface); color: var(--text);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        input[type="number"] { width: 64px; }
        input[type="number"]:disabled { opacity: 0.4; }

        .slider-hint {
            font-size: 0.74rem; color: var(--text-soft);
            margin-top: -0.15rem; font-style: italic;
        }
        .slider-warning {
            font-size: 0.74rem; color: var(--warning);
            margin-top: 0.15rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.3rem;
        }

        .pref-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 0.5rem;
        }
        .pref-pill {
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-size: 0.83rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            color: var(--text-soft); font-family: inherit;
            display: flex; flex-direction: column;
            align-items: center; gap: 0.15rem; text-align: center;
        }
        .pref-pill:hover { border-color: var(--primary); color: var(--primary-dark); background: var(--primary-soft); }
        .pref-pill.active {
            background: var(--accent); border-color: var(--accent); color: var(--bg);
        }
        [data-theme="dark"] .pref-pill.active {
            background: var(--primary); border-color: var(--primary); color: #1a140d;
        }
        .pref-pill .e { font-size: 1.1rem; }
        .pref-pill .h {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 500; font-variant-numeric: tabular-nums;
        }
        .pref-pill.active .h { color: rgba(255,255,255,0.75); }
        [data-theme="dark"] .pref-pill.active .h { color: rgba(26,20,13,0.7); }

        .pref-info {
            margin-top: 0.85rem;
            padding: 0.85rem 1rem;
            background: var(--primary-soft);
            border-left: 3px solid var(--primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.85rem; color: var(--text-soft);
            line-height: 1.55;
        }
        .pref-info-title {
            display: flex; justify-content: space-between;
            margin-bottom: 0.4rem;
            font-weight: 600; color: var(--accent);
            font-family: 'Fraunces', serif; font-size: 0.95rem;
        }
        [data-theme="dark"] .pref-info-title { color: var(--primary); }
        .pref-info-meta {

              config: { doughType: 'pan', flour: 500, hydration: 75, saltPercent: 2, temperature: 22, useColdProof: true, coldProofTime: 18, prefermentType: 'none' } },
            { id: 'baguette', name: '🥖 Baguette con poolish',
              config: { doughType: 'pan', flour: 500, hydration: 72, saltPercent: 2, totalTime: 3, temperature: 22, useColdProof: false, prefermentType: 'poolish', prefermentFlourPercent: 30, prefermentTime: 14, prefermentTemp: 20 } },
            { id: 'ciabatta', name: '🧇 Ciabatta con biga',
              config: { doughType: 'pan', flour: 500, hydration: 80, saltPercent: 2.2, totalTime: 3, temperature: 22, useColdProof: false, prefermentType: 'biga', prefermentFlourPercent: 50, prefermentTime: 16, prefermentTemp: 18 } },
            { id: 'pizza_napo', name: '🍕 Pizza napolitana 24h',
              config: { doughType: 'pizza', pizzaBalls: 4, hydration: 65, saltPercent: 2.8, temperature: 22, useColdProof: true, coldProofTime: 24, prefermentType: 'none' } },
            { id: 'brioche', name: '🥐 Brioche con esponja',
              config: { doughType: 'pan', flour: 500, hydration: 60, saltPercent: 1.8, totalTime: 2, temperature: 24, useColdProof: false, prefermentType: 'esponja', prefermentFlourPercent: 25, prefermentTime: 5, prefermentTemp: 25 } },
        ];

        // ============================================================
        // ICONS
        // ============================================================
        const Icon = ({ name, size = 16 }) => {
            const paths = {
                sun: (<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>),
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                printer: (<><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></>),
                copy: (<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>),
                download: (<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>),
                refresh: (<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>),
                alert: (<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></>),
                check: <polyline points="20 6 9 17 4 12"/>,
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name]}
                </svg>
            );
        };

        // ============================================================
        // SLIDER
        // ============================================================
        const Slider = ({ label, icon, value, onChange, min, max, step, unit, disabled, hint, warning, tip, hidden }) => {
            if (hidden) return null;
            return (
            <div className="slider-row">
                <div className={`slider-label ${disabled ? 'disabled' : ''}`}>
                    <span className="slider-label-left">
                        {icon && <span className="ic">{icon}</span>}
                        {label}
                        {tip && <span className="tooltip-trigger" data-tip={tip}>i</span>}
                    </span>
                    <span className={`slider-value-pill ${disabled ? 'disabled' : ''}`}>
                        {value}{unit && ' ' + unit}
                    </span>
                </div>
                <div className="slider-track">
                    <input type="range" min={min} max={max} step={step} value={value}
                        onChange={e => onChange(parseFloat(e.target.value))} disabled={disabled} />
                    <input type="number" value={value} min={min} max={max} step={step}
                        onChange={e => onChange(parseFloat(e.target.value) || 0)} disabled={disabled} />
                </div>
                {hint && !disabled && <div className="slider-hint">{hint}</div>}
                {warning && !disabled && <div className="slider-warning"><Icon name="alert" size={12}/> {warning}</div>}
            </div>
            );
        };

        // ============================================================
        // FORMAT HELPERS
        // ============================================================
        const formatHours = (hours) => {
            if (!hours || hours <= 0) return '—';
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (h === 0) return `${m} min`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}min`;
        };

        const addHours = (date, hours) => new Date(date.getTime() + hours * 3600000);
        const formatClock = (date) => date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        const formatDay = (date, ref) => {
            const d1 = new Date(date); d1.setHours(0,0,0,0);
            const d2 = new Date(ref); d2.setHours(0,0,0,0);
            const diff = Math.round((d1 - d2) / 86400000);
            if (diff === 0) return '';
            if (diff === -1) return '(día -1)';
            if (diff === -2) return '(día -2)';
            if (diff === 1) return '(día siguiente)';
            return diff > 0 ? `(+${diff}d)` : `(${diff}d)`;
        };

        // ============================================================
        // PREFERMENT INFO
        // ============================================================
        const PrefermentInfo = ({ type }) => {
            const info = PREFERMENTS[type];
            if (!info || type === 'none') return null;
            return (
                <div className="pref-info animate-in">
                    <div className="pref-info-title">
                        <span>{info.name}</span>
                        <div className="pref-info-meta"><span>{info.hydration}%</span></div>
                    </div>
                    {info.desc}
                    <div className="pref-info-tip">💡 {info.tip}</div>
                    <div className="pref-info-flavor">🫙 {info.flavor}</div>
                </div>
            );
        };

        // ============================================================
        // BAKING PLAN
        // ============================================================
        const BakingPlan = ({ plan }) => (
            <div className="bake-card animate-in">
                <div className="bake-header">🔥 Plan de horneado</div>
                <div className="bake-preheat">
                    <span>Precalentamiento</span>
                    <span><span className="pt">{plan.preheat.temp}</span> · {plan.preheat.time}</span>
                </div>
                <div className="bake-note">⚠️ {plan.preheat.notes}</div>
                {plan.phases.map((phase, i) => (
                    <div key={i} className="bake-phase">
                        <div className="bake-phase-title">Fase {i + 1} — {phase.name}</div>
                        <div className="bake-stats">
                            <div className="bake-stat"><div className="v">{phase.temp}</div><div className="l">Temp.</div></div>
                            <div className="bake-stat"><div className="v">{phase.time}</div><div className="l">Tiempo</div></div>
                            <div className="bake-stat"><div className="v" style={{fontSize:'0.78rem'}}>{phase.mode}</div><div className="l">Modo</div></div>
                        </div>
                        <div className="bake-action">{phase.action}</div>
                    </div>
                ))}
                <div className="bake-note">❄️ {plan.cooling}</div>
            </div>
        );

        // ============================================================
        // QUALITY CHECK
        // ============================================================
        const useQualityCheck = (params) => useMemo(() => {
            const issues = [];
            const { doughType, hydration, saltPercent, temperature, totalTime, useColdProof, coldProofTime, prefermentType, prefermentTemp } = params;

            // Hydration and salt warnings only apply to pan (pizza uses fixed canonical values)
            if (doughType === 'pan' && hydration < 55) issues.push({ level: 'warn', msg: 'Hidratación baja: la miga será densa.' });
            if (doughType === 'pan' && hydration > 85) issues.push({ level: 'warn', msg: 'Hidratación muy alta: requiere técnica avanzada (folds frecuentes, pliegues en frío).' });
            if (doughType === 'pan' && saltPercent < 1.5) issues.push({ level: 'warn', msg: 'Poca sal: fermentación demasiado rápida y poco sabor.' });
            if (doughType === 'pan' && saltPercent > 3) issues.push({ level: 'warn', msg: 'Demasiada sal: puede inhibir la levadura.' });
            if (temperature < 16) issues.push({ level: 'info', msg: 'Temperatura baja: la fermentación será muy lenta.' });
            if (temperature > 28) issues.push({ level: 'warn', msg: 'Temperatura alta: la masa puede sobrefermentar y desarrollar acidez excesiva.' });
            if (!useColdProof && totalTime < 1.5) issues.push({ level: 'warn', msg: 'Tiempo muy corto: la masa no desarrollará sabor.' });
            if (useColdProof && coldProofTime > 48) issues.push({ level: 'info', msg: 'Frío muy largo: vigila signos de sobrefermentación al sacar.' });

            if (prefermentType !== 'none' && prefermentType !== 'masa_madre') {
                const ideal = PREFERMENTS[prefermentType].ideal;
                if (prefermentTemp < ideal.temp[0] - 2) issues.push({ level: 'info', msg: `${PREFERMENTS[prefermentType].name}: temperatura por debajo del rango ideal (${ideal.temp[0]}-${ideal.temp[1]}°C).` });
                if (prefermentTemp > ideal.temp[1] + 2) issues.push({ level: 'warn', msg: `${PREFERMENTS[prefermentType].name}: temperatura por encima del rango ideal, riesgo de sobrefermentación.` });
            }

            let score = 5;
            issues.forEach(i => {
                if (i.level === 'bad') score -= 2;
                else if (i.level === 'warn') score -= 1;
            });
            return { issues, score: clamp(score, 1, 5) };
        }, [params]);

        // ============================================================
        // PIZZA TOPPINGS COMPONENT
        // Multi-pizza selector with per-pizza ingredients + shopping list
        // ============================================================
        const PizzaToppings = ({ counts, setCounts, maxPizzas, showToast }) => {
            const totalPizzas = Object.values(counts).reduce((s, n) => s + n, 0);
            const remaining = Math.max(0, maxPizzas - totalPizzas);
            const isAtLimit = totalPizzas >= maxPizzas;
            const isOverLimit = totalPizzas > maxPizzas;

            // Aggregate ingredients across all selected pizzas
            const shoppingList = useMemo(() => {
                const totals = {};
                Object.entries(counts).forEach(([variantId, count]) => {
                    if (count <= 0) return;
                    const variant = PIZZA_VARIANTS[variantId];
                    variant.ingredients.forEach(ing => {
                        if (!totals[ing.id]) {
                            totals[ing.id] = { total: 0, unit: ing.unit };
                        }
                        totals[ing.id].total += ing.g * count;
                    });
                });
                return totals;
            }, [counts]);

            const setCount = (id, delta) => {
                setCounts(prev => {
                    const currentTotal = Object.values(prev).reduce((s, n) => s + n, 0);
                    const newValue = Math.max(0, (prev[id] || 0) + delta);
                    // Block increase if it would exceed maxPizzas
                    if (delta > 0 && currentTotal >= maxPizzas) {
                        showToast(`Límite alcanzado: ${maxPizzas} bolas`);
                        return prev;
                    }
                    return { ...prev, [id]: newValue };
                });
            };

            const setCountValue = (id, value) => {
                setCounts(prev => {
                    const requested = Math.max(0, parseInt(value) || 0);
                    const others = Object.entries(prev).reduce((s, [k, n]) => k === id ? s : s + n, 0);
                    const maxAllowed = Math.max(0, maxPizzas - others);
                    const finalValue = Math.min(requested, maxAllowed);
                    if (requested > maxAllowed) {
                        showToast(`Solo ${maxAllowed} ${maxAllowed === 1 ? 'bola disponible' : 'bolas disponibles'}`);
                    }
                    return { ...prev, [id]: finalValue };
                });
            };

            const resetCounts = () => {
                if (!window.confirm('¿Poner todas las pizzas a 0?')) return;
                const zeroed = {};
                Object.keys(PIZZA_VARIANTS).forEach(k => zeroed[k] = 0);
                setCounts(zeroed);
                showToast('Pizzas reseteadas');
            };

            const autoDistribute = () => {
                // Distribute proportionally to the default suggestion: marghe 3, diavola 2, speck 2, pollo 2, marinara 1, quattro 1, bianca 1
                const weights = {
                    margherita: 3, diavola: 2, speck_gorgonzola: 2,
                    pollo_maiz: 2, marinara: 1, quattro_formaggi: 1,
                    bianca_speck: 1, cacio_pepe: 1, capricciosa: 0,
                };
                const totalWeight = Object.values(weights).reduce((s, n) => s + n, 0);
                const distributed = {};
                let assigned = 0;
                // First pass: round down
                Object.entries(weights).forEach(([k, w]) => {
                    const v = Math.floor((w / totalWeight) * maxPizzas);
                    distributed[k] = v;
                    assigned += v;
                });
                // Distribute remainder to highest weights
                const sortedKeys = Object.entries(weights).sort((a, b) => b[1] - a[1]).map(e => e[0]);
                let i = 0;
                while (assigned < maxPizzas && i < sortedKeys.length * 5) {
                    distributed[sortedKeys[i % sortedKeys.length]]++;
                    assigned++;
                    i++;
                }
                setCounts(distributed);
                showToast(`Reparto sugerido para ${maxPizzas} bolas`);
            };

            // Build a text summary for copy
            const buildText = () => {
                const lines = [];
                lines.push(`PIZZAS — ${totalPizzas} unidades en total`);
                lines.push('═══════════════════════════════════════');

                Object.entries(counts).forEach(([id, count]) => {
                    if (count <= 0) return;
                    const v = PIZZA_VARIANTS[id];
                    lines.push(`\n${v.emoji} ${v.name} × ${count}`);
                    v.ingredients.forEach(ing => {
                        const total = ing.g * count;
                        const totalStr = ing.unit === 'hojas' ? `${Math.round(total)} hojas` : `${round(total, 1)}g`;
                        lines.push(`  ${ing.name}: ${round(ing.g, 1)}${ing.unit === 'hojas' ? ' hojas' : 'g'}/pizza × ${count} = ${totalStr}`);
                    });
                });

                lines.push('\n═══════════════════════════════════════');
                lines.push('LISTA DE LA COMPRA AGREGADA');
                lines.push('═══════════════════════════════════════');
                TOPPING_ORDER.forEach(id => {
                    const data = shoppingList[id];
                    if (!data || data.total <= 0) return;
                    const info = TOPPING_PURCHASE_INFO[id];
                    let line;
                    if (data.unit === 'hojas') {
                        line = `${info.label}: ~${Math.round(data.total)} hojas`;
                    } else if (id === 'fiordilatte') {
                        const buy = data.total / TOPPING_PURCHASE_INFO.fiordilatte.shrink;
                        line = `${info.label}: ${Math.round(data.total)}g escurrida → comprar ~${Math.round(buy)}g sin escurrir`;
                    } else {
                        line = `${info.label}: ${round(data.total, 1)}g`;
                    }
                    if (info.note) line += `  (${info.note})`;
                    lines.push('• ' + line);
                });

                return lines.join('\n');
            };

            const copyAll = () => {
                navigator.clipboard?.writeText(buildText()).then(() => showToast('Receta copiada ✓'));
            };

            const downloadAll = () => {
                const blob = new Blob([buildText()], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pizzas-${totalPizzas}u.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Lista descargada ✓');
            };

            return (
                <div className="animate-in">
                    {/* Header with progress */}
                    <div style={{
                        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                        marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem',
                        padding: '0.75rem 0.95rem',
                        background: isOverLimit ? 'var(--danger-soft)' : isAtLimit ? 'var(--success-soft)' : 'var(--surface-2)',
                        border: `1px solid ${isOverLimit ? 'var(--danger)' : isAtLimit ? 'var(--success)' : 'var(--border-soft)'}`,
                        borderRadius: 'var(--radius-sm)',
                        transition: 'all 0.2s',
                    }}>
                        <div>
                            <div style={{fontSize: '0.78rem', color: 'var(--text-soft)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 600, marginBottom: '0.2rem'}}>
                                Asignadas
                            </div>
                            <div style={{fontFamily: 'Fraunces, serif', fontSize: '1.35rem', fontWeight: 500, color: 'var(--text)', lineHeight: 1, fontVariantNumeric: 'tabular-nums'}}>
                                {totalPizzas} <span style={{color: 'var(--text-muted)', fontSize: '1rem'}}>/ {maxPizzas} bolas</span>
                            </div>
                            <div style={{fontSize: '0.78rem', marginTop: '0.25rem', color: isOverLimit ? 'var(--danger)' : remaining === 0 ? 'var(--success)' : 'var(--text-soft)', fontWeight: 500}}>
                                {isOverLimit ? `⚠️ Te pasas por ${totalPizzas - maxPizzas}` : remaining === 0 ? '✓ Todo asignado' : `Quedan ${remaining} por asignar`}
                            </div>
                        </div>
                        <div style={{display: 'flex', gap: '0.4rem', flexWrap: 'wrap'}}>
                            <button className="icon-btn" onClick={autoDistribute} title="Repartir automáticamente según mi sugerencia">
                                ✨ Auto
                            </button>
                            <button className="icon-btn" onClick={resetCounts}>↻ Reset</button>
                            <button className="icon-btn" onClick={copyAll} disabled={totalPizzas === 0}><Icon name="copy" size={14}/></button>
                            <button className="icon-btn" onClick={downloadAll} disabled={totalPizzas === 0}><Icon name="download" size={14}/></button>
                        </div>
                    </div>

                    {/* Hint when at zero */}
                    {totalPizzas === 0 && (
                        <div className="info-note" style={{marginBottom: '1rem'}}>
                            💡 Pulsa <strong>✨ Auto</strong> para que reparta las {maxPizzas} bolas automáticamente con mi sugerencia, o configura tú mismo cuántas de cada.
                        </div>
                    )}

                    {/* Variant selector */}
                    <div style={{fontFamily: 'Fraunces, serif', fontSize: '0.95rem', fontWeight: 500, color: 'var(--accent)', marginBottom: '0.6rem'}}>
                        Elige cuántas de cada
                    </div>
                    <div style={{display: 'flex', flexDirection: 'column', gap: '0.5rem', marginBottom: '1.25rem'}}>
                        {Object.entries(PIZZA_VARIANTS).map(([id, v]) => {
                            const count = counts[id] || 0;
                            const canIncrease = !isAtLimit;
                            return (
                                <div key={id} style={{
                                    display: 'grid',
                                    gridTemplateColumns: '1fr auto',
                                    gap: '0.7rem',
                                    alignItems: 'center',
                                    padding: '0.7rem 0.85rem',
                                    background: count > 0 ? 'var(--primary-soft)' : 'var(--surface-2)',
                                    border: `1px solid ${count > 0 ? 'var(--primary)' : 'var(--border-soft)'}`,
                                    borderRadius: 'var(--radius-sm)',
                                    transition: 'all 0.15s',
                                }}>
                                    <div style={{minWidth: 0}}>
                                        <div style={{fontWeight: 600, fontSize: '0.92rem', color: 'var(--text)', marginBottom: '0.15rem'}}>
                                            {v.emoji} {v.name}
                                        </div>
                                        <div style={{fontSize: '0.76rem', color: 'var(--text-soft)', lineHeight: 1.4}}>
                                            {v.desc}
                                        </div>
                                    </div>
                                    <div style={{display: 'flex', alignItems: 'center', gap: '0.35rem', flexShrink: 0}}>
                                        <button onClick={() => setCount(id, -1)}
                                            disabled={count === 0}
                                            style={{
                                                width: '32px', height: '32px',
                                                border: '1px solid var(--border)',
                                                borderRadius: '6px',
                                                background: count === 0 ? 'var(--surface-2)' : 'var(--surface)',
                                                color: count === 0 ? 'var(--text-muted)' : 'var(--text)',
                                                cursor: count === 0 ? 'not-allowed' : 'pointer',
                                                opacity: count === 0 ? 0.5 : 1,
                                                fontFamily: 'inherit', fontSize: '1rem', fontWeight: 600,
                                            }}>−</button>
                                        <input type="number" min="0" max={maxPizzas} value={count}
                                            onChange={e => setCountValue(id, e.target.value)}
                                            style={{width: '48px', padding: '0.3rem 0.4rem', fontSize: '0.95rem', fontWeight: 600}} />
                                        <button onClick={() => setCount(id, 1)}
                                            disabled={!canIncrease}
                                            style={{
                                                width: '32px', height: '32px',
                                                border: '1px solid var(--border)',
                                                borderRadius: '6px',
                                                background: !canIncrease ? 'var(--surface-2)' : 'var(--surface)',
                                                color: !canIncrease ? 'var(--text-muted)' : 'var(--text)',
                                                cursor: !canIncrease ? 'not-allowed' : 'pointer',
                                                opacity: !canIncrease ? 0.5 : 1,
                                                fontFamily: 'inherit', fontSize: '1rem', fontWeight: 600,
                                            }}>+</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {totalPizzas === 0 ? null : (
                        <>
                            {/* Per-pizza breakdown */}
                            <div style={{fontFamily: 'Fraunces, serif', fontSize: '0.95rem', fontWeight: 500, color: 'var(--accent)', marginBottom: '0.6rem'}}>
                                🍕 Cantidades por pizza
                            </div>
                            <div style={{display: 'flex', flexDirection: 'column', gap: '0.85rem', marginBottom: '1.5rem'}}>
                                {Object.entries(counts).map(([id, count]) => {
                                    if (count <= 0) return null;
                                    const v = PIZZA_VARIANTS[id];
                                    return (
                                        <div key={id} className="phase-card" style={{marginBottom: 0, padding: '0.85rem 1rem'}}>
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', gap: '0.5rem', flexWrap: 'wrap'}}>
                                                <div style={{fontWeight: 600, fontSize: '0.92rem', color: 'var(--text)'}}>
                                                    {v.emoji} {v.name}
                                                </div>
                                                <span style={{fontSize: '0.72rem', color: 'var(--text-soft)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 700, background: 'var(--surface-2)', padding: '0.15rem 0.55rem', borderRadius: '999px'}}>
                                                    × {count}
                                                </span>
                                            </div>
                                            <table className="recipe-table" style={{marginBottom: 0}}>
                                                <thead>
                                                    <tr>
                                                        <th>Ingrediente</th>
                                                        <th style={{textAlign: 'right'}}>Por pizza</th>
                                                        <th style={{textAlign: 'right'}}>Total ({count})</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {v.ingredients.map(ing => {
                                                        const perPizza = ing.unit === 'hojas' ? `${ing.g} hojas` : `${round(ing.g, 1)}g`;
                                                        const total = ing.g * count;
                                                        const totalStr = ing.unit === 'hojas' ? `${Math.round(total)} hojas` : `${round(total, 1)}g`;
                                                        return (
                                                            <tr key={ing.id}>
                                                                <td>
                                                                    {ing.name}
                                                                    {ing.note && <div className="note">{ing.note}</div>}
                                                                </td>
                                                                <td className="qty" style={{whiteSpace: 'nowrap'}}>{perPizza}</td>
                                                                <td className="qty" style={{whiteSpace: 'nowrap'}}>{totalStr}</td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Shopping list */}

        };

        // ============================================================
        // GOFRES RESULTS COMPONENT
        // ============================================================
        const GofresResults = ({ units, coldHours, readyTime, setReadyTime, showToast }) => {
            const [activeTab, setActiveTab] = useState('recipe');
            const recipe = useMemo(() => scaleGofres(units), [units]);

            // Build schedule (working backwards from ready time)
            const schedule = useMemo(() => {
                const [bh, bm] = readyTime.split(':').map(Number);
                const ready = new Date();
                ready.setHours(bh, bm, 0, 0);
                if (ready < new Date()) ready.setDate(ready.getDate() + 1);

                // Cooking takes ~3-5 min per waffle batch; assume 4 per batch on average
                const batchesNeeded = Math.ceil(units / 4);
                const cookingTime = batchesNeeded * 4 / 60; // hours

                const events = [];
                events.push({ time: new Date(ready), name: 'Listos para servir', desc: 'Cómelos tibios, recién caramelizados', icon: '🧇', kind: 'normal' });
                events.push({ time: addHours(ready, -0.03), name: 'Reposo final', desc: '2 min sobre rejilla — el caramelo endurece', icon: '⏳', kind: 'normal', dur: 0.03 });
                events.push({ time: addHours(ready, -0.03 - cookingTime), name: 'Cocción en gofrera', desc: `${batchesNeeded} ${batchesNeeded === 1 ? 'tanda' : 'tandas'} de 3-5 min`, icon: '🔥', kind: 'bake', dur: cookingTime });
                events.push({ time: addHours(ready, -0.5 - 0.03 - cookingTime), name: 'Última fermentación + precalentar gofrera', desc: '30 min · bolas hinchadas y blandas al tacto', icon: '🥯', kind: 'normal', dur: 0.5 });
                events.push({ time: addHours(ready, -0.58 - 0.03 - cookingTime), name: 'Formar las bolas', desc: `${units} bolas de ~${GOFRE_WEIGHT}g`, icon: '🤲', kind: 'normal', dur: 0.08 });
                events.push({ time: addHours(ready, -0.83 - 0.03 - cookingTime), name: 'Incorporar azúcar perlado + reposo', desc: 'Plegar suave sin amasar · 15 min reposo', icon: '✨', kind: 'normal', dur: 0.25 });
                events.push({ time: addHours(ready, -0.83 - 0.03 - cookingTime - coldHours), name: 'A la nevera', desc: `Fermentación fría: ${formatHours(coldHours)}`, icon: '❄️', kind: 'cold', dur: coldHours });
                events.push({ time: addHours(ready, -2.33 - 0.03 - cookingTime - coldHours), name: 'Primera fermentación', desc: '90 min a 20-22°C · debe doblar volumen', icon: '🥣', kind: 'normal', dur: 1.5 });
                events.push({ time: addHours(ready, -2.55 - 0.03 - cookingTime - coldHours), name: 'Amasar + incorporar mantequilla', desc: '~13 min en total', icon: '🧈', kind: 'normal', dur: 0.22 });
                events.push({ time: addHours(ready, -2.72 - 0.03 - cookingTime - coldHours), name: 'Activar la levadura', desc: '10 min · leche tibia + levadura + azúcar → debe espumar', icon: '🫧', kind: 'start', dur: 0.17 });
                return events.reverse();
            }, [readyTime, units, coldHours]);

            const buildText = () => {
                const lines = [];
                lines.push(`GOFRES DE LIEJA — ${units} unidades (~${Math.round(GOFRE_WEIGHT * units)}g de masa)`);
                lines.push('═══════════════════════════════════════');
                lines.push('\nINGREDIENTES:');
                lines.push(`  Harina de fuerza: ${round(recipe.flour, 0)}g`);
                lines.push(`  Leche entera tibia (35°C): ${round(recipe.milk, 0)}ml`);
                lines.push(`  Levadura seca de panadero: ${round(recipe.yeast, 1)}g`);
                lines.push(`  Huevos grandes: ${round(recipe.eggs, 1)}`);
                lines.push(`  Azúcar (para activar): ${round(recipe.sugar, 1)}g`);
                lines.push(`  Sal: ${round(recipe.salt, 1)}g`);
                lines.push(`  Extracto de vainilla: ${round(recipe.vanilla, 1)}g`);
                lines.push(`  Mantequilla a t.a.: ${round(recipe.butter, 0)}g`);
                lines.push(`  Perlas de azúcar: ${round(recipe.pearls, 0)}g`);
                lines.push('\nPROCESO:');
                GOFRES_PROCESS.forEach(p => {
                    const desc = p.dynamic ? `${formatHours(coldHours)} en nevera. Desarrolla sabor y facilita el manejo.`
                              : p.dynamic2 ? `Divide en ${units} porciones de ~${GOFRE_WEIGHT}g y bolea con cuidado.`
                              : p.desc;
                    lines.push(`  ${p.step}. ${p.name} (${p.time}): ${desc}`);
                });
                lines.push('\nCOCCIÓN: Gofrera precalentada, 3-5 min/tanda hasta dorado y caramelizado.');
                return lines.join('\n');
            };

            const copyAll = () => {
                navigator.clipboard?.writeText(buildText()).then(() => showToast('Receta copiada ✓'));
            };
            const downloadAll = () => {
                const blob = new Blob([buildText()], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `gofres-lieja-${units}u.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Receta descargada ✓');
            };

            return (
                <div>
                    <div className="tabs">
                        <button className={`tab ${activeTab === 'recipe' ? 'active' : ''}`} onClick={() => setActiveTab('recipe')}>📋 Receta</button>
                        <button className={`tab ${activeTab === 'process' ? 'active' : ''}`} onClick={() => setActiveTab('process')}>📜 Proceso</button>
                        <button className={`tab ${activeTab === 'schedule' ? 'active' : ''}`} onClick={() => setActiveTab('schedule')}>⏱ Cronograma</button>
                        <button className={`tab ${activeTab === 'tips' ? 'active' : ''}`} onClick={() => setActiveTab('tips')}>💡 Consejos</button>
                    </div>

                    {/* RECIPE TAB */}
                    {activeTab === 'recipe' && (
                        <div className="animate-in">
                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem'}}>
                                <div style={{fontSize: '0.83rem', color: 'var(--text-soft)'}}>
                                    <strong style={{color: 'var(--text)'}}>{units} gofres</strong> · ~{Math.round(GOFRE_WEIGHT * units)}g de masa total · {Math.ceil(units / 2)} personas
                                </div>
                                <div style={{display: 'flex', gap: '0.4rem'}}>
                                    <button className="icon-btn" onClick={copyAll}><Icon name="copy" size={14}/> Copiar</button>
                                    <button className="icon-btn" onClick={downloadAll}><Icon name="download" size={14}/></button>
                                </div>
                            </div>

                            <table className="recipe-table">
                                <thead>
                                    <tr><th>Ingrediente</th><th style={{textAlign: 'right'}}>Cantidad</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>Harina de fuerza</td><td className="qty">{round(recipe.flour, 0)}g</td></tr>
                                    <tr><td>Leche entera tibia <span style={{fontSize: '0.7rem', color: 'var(--text-muted)'}}>(35°C)</span></td><td className="qty">{round(recipe.milk, 0)}ml</td></tr>
                                    <tr><td>Levadura seca de panadero</td><td className="qty">{round(recipe.yeast, 1)}g</td></tr>
                                    <tr><td>Huevos grandes</td><td className="qty">{round(recipe.eggs, 1)} ud</td></tr>
                                    <tr><td>Azúcar <span style={{fontSize: '0.7rem', color: 'var(--text-muted)'}}>(para activar levadura)</span></td><td className="qty">{round(recipe.sugar, 1)}g</td></tr>
                                    <tr><td>Sal</td><td className="qty">{round(recipe.salt, 1)}g</td></tr>
                                    <tr><td>Extracto de vainilla</td><td className="qty">{round(recipe.vanilla, 1)}g</td></tr>
                                    <tr><td>Mantequilla <span style={{fontSize: '0.7rem', color: 'var(--text-muted)'}}>(a temperatura ambiente)</span></td><td className="qty">{round(recipe.butter, 0)}g</td></tr>
                                    <tr className="subtotal"><td>🍬 Perlas de azúcar belga</td><td className="qty">{round(recipe.pearls, 0)}g</td></tr>
                                </tbody>
                            </table>

                            <div className="warn-box">
                                <Icon name="alert" />
                                <span><strong>El azúcar perlado es imprescindible.</strong> No se puede sustituir por azúcar normal: se disolvería en la masa en lugar de caramelizar. Las perlas grandes (tipo belga) dan mejor crujiente.</span>
                            </div>

                            <div className="info-note">
                                <strong>Mantequilla:</strong> debe estar realmente a temperatura ambiente (blanda al tacto pero no derretida). Sácala 1-2h antes.
                                <br/><strong>Leche tibia:</strong> 35°C, ni fría ni caliente. Si quema al dedo, está muy caliente y matará la levadura.
                            </div>
                        </div>
                    )}

                    {/* PROCESS TAB */}
                    {activeTab === 'process' && (
                        <div className="animate-in">
                            <div style={{display: 'flex', flexDirection: 'column', gap: '0.5rem'}}>
                                {GOFRES_PROCESS.map((p, i) => {
                                    const desc = p.dynamic ? `${formatHours(coldHours)} en nevera. Desarrolla sabor y facilita el manejo de la masa (que de otra forma sería demasiado blanda).`
                                              : p.dynamic2 ? `Divide la masa en ${units} porciones de ~${GOFRE_WEIGHT}g y bolea con cuidado. Tápalas con un paño.`
                                              : p.desc;
                                    return (
                                        <div key={i} style={{display: 'grid', gridTemplateColumns: '32px 1fr', gap: '0.6rem', padding: '0.7rem 0.85rem', background: 'var(--surface-2)', borderRadius: 'var(--radius-sm)', alignItems: 'flex-start'}}>
                                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', width: '28px', height: '28px', borderRadius: '50%', background: 'var(--surface)', fontFamily: 'Fraunces, serif', fontWeight: 600, color: 'var(--accent)', fontSize: '0.85rem'}}>
                                                {p.step}
                                            </div>
                                            <div>
                                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '0.5rem', marginBottom: '0.2rem', flexWrap: 'wrap'}}>
                                                    <div style={{fontWeight: 600, fontSize: '0.9rem', color: 'var(--text)'}}>
                                                        {p.icon} {p.name}
                                                    </div>
                                                    <span style={{fontSize: '0.7rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600}}>
                                                        {p.time}
                                                    </span>
                                                </div>
                                                <div style={{fontSize: '0.82rem', color: 'var(--text-soft)', lineHeight: 1.5}}>
                                                    {desc}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="info-note" style={{marginTop: '1rem'}}>
                                <strong>Cocción visual:</strong> sabrás que están cuando deje de salir vapor abundante de la gofrera. El caramelo exterior endurece al enfriar — esa es la costra crujiente característica.
                            </div>
                        </div>
                    )}

                    {/* SCHEDULE TAB */}
                    {activeTab === 'schedule' && (
                        <div className="animate-in">
                            <div className="schedule-input">
                                <label>🧇 ¿A qué hora quieres comerlos?</label>
                                <input type="time" value={readyTime} onChange={e => setReadyTime(e.target.value)} />
                            </div>
                            <div className="schedule">
                                {schedule.map((ev, i) => (
                                    <div key={i} className={`schedule-row ${ev.kind}`}>
                                        <div className="schedule-time">
                                            {formatClock(ev.time)}
                                            <div style={{fontSize: '0.65rem', color: 'var(--text-muted)', fontWeight: 400, fontFamily: 'Inter'}}>
                                                {formatDay(ev.time, schedule[schedule.length-1].time)}
                                            </div>
                                        </div>
                                        <div className="schedule-step">
                                            <div className="name">
                                                <span className="ic">{ev.icon}</span>
                                                {ev.name}
                                            </div>
                                            <div className="desc">{ev.desc}</div>
                                        </div>
                                        <div className="schedule-duration">
                                            {ev.dur ? formatHours(ev.dur) : ''}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="info-note">
                                <strong>Cronograma calculado hacia atrás</strong> desde tu hora de servir. Si la fermentación fría es larga (12-24h), el inicio cae el día anterior.
                            </div>
                        </div>
                    )}

                    {/* TIPS TAB */}
                    {activeTab === 'tips' && (
                        <div className="animate-in">
                            <div style={{display: 'flex', flexDirection: 'column', gap: '0.6rem'}}>
                                {GOFRES_TIPS.map((t, i) => (
                                    <div key={i} className="phase-card" style={{marginBottom: 0}}>
                                        <div style={{fontFamily: 'Fraunces, serif', fontSize: '0.95rem', fontWeight: 600, color: 'var(--accent)', marginBottom: '0.35rem'}}>
                                            {t.title}
                                        </div>
                                        <div style={{fontSize: '0.85rem', color: 'var(--text-soft)', lineHeight: 1.55}}>
                                            {t.desc}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="bake-card" style={{marginTop: '1rem'}}>
                                <div className="bake-header">🔥 Cocción en gofrera</div>
                                <div className="bake-preheat">
                                    <span>Precalentamiento</span>
                                    <span><span className="pt">Media-alta</span> · mientras las bolas levan</span>
                                </div>
                                <div className="bake-phase">
                                    <div className="bake-phase-title">Cocción por tandas</div>
                                    <div className="bake-stats">
                                        <div className="bake-stat"><div className="v">3-5 min</div><div className="l">Por tanda</div></div>
                                        <div className="bake-stat"><div className="v">{Math.ceil(units / 4)}</div><div className="l">Tandas estim.</div></div>
                                        <div className="bake-stat"><div className="v">~{Math.ceil(units / 4) * 4}min</div><div className="l">Total</div></div>
                                    </div>
                                    <div className="bake-action">
                                        Una bola por cavidad. <strong>NO cocines pegados</strong> — el azúcar fundido necesita salir por los bordes. Espera a que deje de salir vapor abundante: ahí están listos.
                                    </div>
                                </div>
                                <div className="bake-note">⚠️ La gofrera se pringará de caramelo. Es normal: limpia con papel húmedo cuando aún esté templada.</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // FOCACCIA RESULTS COMPONENT
        // ============================================================
        const FocacciaResults = ({ starterType, totalWeight, ambientTemp, bakeTime, setBakeTime, showToast }) => {
            const [activeTab, setActiveTab] = useState('recipe');

            // Auto-select thermal mode based on temperature
            const thermalMode = ambientTemp >= 26 ? 'calor' : 'normal';
            const base = FOCACCIA_BASE[thermalMode][starterType];
            const recipe = useMemo(() => scaleFocaccia(base, totalWeight), [base, totalWeight]);

            // Calculate effective hydration (counting starter contribution)
            // Masa madre is 100% hydration → half flour, half water
            // Fresh yeast contributes negligibly
            const effFlour = starterType === 'masa_madre'
                ? recipe.flour + recipe.starter / 2
                : recipe.flour;
            const effWater = starterType === 'masa_madre'
                ? recipe.water + recipe.starter / 2
                : recipe.water;
            const effHydration = (effWater / effFlour) * 100;

            const levado1Hours = base.levado1;

            // Build schedule (working backwards from bake time on day 2)
            const schedule = useMemo(() => {
                const [bh, bm] = bakeTime.split(':').map(Number);
                const bake = new Date();
                bake.setHours(bh, bm, 0, 0);
                if (bake < new Date()) bake.setDate(bake.getDate() + 1);

                const events = [];
                events.push({ time: new Date(bake.getTime() + 30 * 60000), name: 'Cortar y servir', desc: 'La miga ya ha asentado', icon: '🍽️', kind: 'normal' });
                events.push({ time: new Date(bake), name: 'Hornear', desc: '220°C con vapor · 30 min', icon: '🔥', kind: 'bake' });
                events.push({ time: addHours(bake, -0.05), name: 'Aliñar y hoyitos', desc: 'Aceite, sal, romero · presionar con dedos', icon: '👇', kind: 'normal' });
                events.push({ time: addHours(bake, -1.1), name: 'Sacar de nevera y extender', desc: 'Atempera 1h · vuelca en bandeja sin amasar', icon: '☀️', kind: 'normal', dur: 1 });
                events.push({ time: addHours(bake, -25.1), name: 'A la nevera (24h)', desc: 'Tapado, fría a 4°C · desarrolla sabor', icon: '❄️', kind: 'cold', dur: 24 });
                events.push({ time: addHours(bake, -25.6), name: 'Reposo tapado', desc: '30 min a temperatura ambiente', icon: '⏱️', kind: 'normal', dur: 0.5 });
                events.push({ time: addHours(bake, -25.6 - levado1Hours), name: 'Bulk + pliegues', desc: `Levado ${formatHours(levado1Hours)} a ${ambientTemp}°C, después 4 pliegues`, icon: '🥣', kind: 'normal', dur: levado1Hours });
                events.push({ time: addHours(bake, -25.7 - levado1Hours), name: 'Empezar amasado', desc: 'Mezcla agua+fermento, harina, sal y aceite al final', icon: '👐', kind: 'start' });
                return events.reverse();
            }, [bakeTime, levado1Hours, ambientTemp]);

            const buildText = () => {
                const lines = [];
                lines.push(`FOCACCIA — ${Math.round(totalWeight)}g (${starterType === 'masa_madre' ? 'masa madre' : 'levadura fresca'})`);
                lines.push('═══════════════════════════════════════');
                if (thermalMode === 'calor') lines.push('Modo: temperatura ambiente alta (>26°C)');
                lines.push('\nINGREDIENTES:');
                lines.push(`  Harina de fuerza: ${round(recipe.flour, 1)}g`);
                lines.push(`  ${starterType === 'masa_madre' ? 'Masa madre activa' : 'Levadura fresca'}: ${round(recipe.starter, 1)}g`);
                lines.push(`  Agua: ${round(recipe.water, 1)}g`);
                lines.push(`  Sal: ${round(recipe.salt, 1)}g`);
                lines.push(`\nHidratación efectiva: ${round(effHydration, 1)}%`);
                lines.push('\nPROCESO:');
                FOCACCIA_PROCESS.forEach(p => {
                    const desc = p.dynamic ? `${formatHours(levado1Hours)} a ${ambientTemp}°C` : p.desc;
                    lines.push(`  ${p.step}. ${p.name}: ${desc}`);
                });
                lines.push('\nHORNEADO: 220°C con poco vapor · 30 min');
                lines.push('Reposo final: 30 min antes de cortar');
                return lines.join('\n');
            };

            const copyAll = () => {
                navigator.clipboard?.writeText(buildText()).then(() => showToast('Receta copiada ✓'));
            };
            const downloadAll = () => {
                const blob = new Blob([buildText()], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `focaccia-${Math.round(totalWeight)}g.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Receta descargada ✓');
            };

            return (
                <div>
                    <div className="tabs">
                        <button className={`tab ${activeTab === 'recipe' ? 'active' : ''}`} onClick={() => setActiveTab('recipe')}>📋 Receta</button>
                        <button className={`tab ${activeTab === 'process' ? 'active' : ''}`} onClick={() => setActiveTab('process')}>📜 Proceso</button>
                        <button className={`tab ${activeTab === 'schedule' ? 'active' : ''}`} onClick={() => setActiveTab('schedule')}>⏱ Cronograma</button>
                        <button className={`tab ${activeTab === 'baking' ? 'active' : ''}`} onClick={() => setActiveTab('baking')}>🔥 Horneado</button>
                    </div>

                    {/* Thermal mode indicator */}
                    {thermalMode === 'calor' && (
                        <div className="warn-box" style={{marginBottom: '1rem'}}>
                            <Icon name="alert" />
                            <span><strong>Modo calor activado</strong> ({ambientTemp}°C ≥ 26°C). Receta ajustada con menos fermento y bulk más corto para evitar sobrefermentación.</span>
                        </div>
                    )}

                    {/* RECIPE TAB */}
                    {activeTab === 'recipe' && (
                        <div className="animate-in">
                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem'}}>
                                <div style={{fontSize: '0.83rem', color: 'var(--text-soft)'}}>
                                    Total: <strong style={{color: 'var(--text)'}}>{Math.round(totalWeight)}g</strong> · {starterType === 'masa_madre' ? '🌾 Masa madre' : '🍞 Levadura fresca'}
                                </div>
                                <div style={{display: 'flex', gap: '0.4rem'}}>
                                    <button className="icon-btn" onClick={copyAll}><Icon name="copy" size={14}/> Copiar</button>
                                    <button className="icon-btn" onClick={downloadAll}><Icon name="download" size={14}/></button>
                                </div>
                            </div>

                            <div className="ing-grid">
                                <div className="ing-card">
                                    <div className="l">Harina de fuerza</div>
                                    <div className="v">{round(recipe.flour, 0)}</div>
                                    <div className="u">gramos</div>
