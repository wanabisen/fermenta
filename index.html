<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PBNS5KPX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // ============================================================
        // FERMENTATION SCIENCE
        // Q10 ≈ 2: yeast activity doubles for each 10°C rise (10–30°C)
        // Reference: at 22°C with 0.4% IDY, basic dough doubles in ~3h
        // ============================================================
        const REF_TEMP = 22, REF_TIME = 3, REF_YEAST = 0.4, FRIDGE_TEMP = 4;

        const rateFactor = (temp) => {
            if (temp < 4) return 0.15;
            if (temp > 35) return 4.5;
            return Math.pow(2, (temp - REF_TEMP) / 10);
        };

        const yeastForTime = (hours, temp) => {
            if (hours <= 0) return 0;
            return (REF_YEAST * REF_TIME) / (hours * rateFactor(temp));
        };

        const yeastForBulk = (ambientH, coldH, ambientT) => {
            const activity = ambientH * rateFactor(ambientT) + coldH * rateFactor(FRIDGE_TEMP);
            if (activity <= 0) return 0;
            return (REF_YEAST * REF_TIME) / activity;
        };

        const clamp = (n, lo, hi) => Math.max(lo, Math.min(n, hi));
        const round = (n, d = 0) => {
            const f = Math.pow(10, d);
            return Math.round(n * f) / f;
        };

        // ============================================================
        // PREFERMENT KNOWLEDGE BASE
        // ============================================================
        const PREFERMENTS = {
            none: { name: 'Sin prefermento', emoji: '∅', hydration: null },
            biga: {
                name: 'Biga', emoji: '🇮🇹', hydration: 45, noYeast: false,
                desc: "Prefermento italiano firme y seco al 45% de hidratación. Fermentación lenta que desarrolla un gluten muy fuerte y aromas complejos por su baja actividad de agua.",
                tip: "Ideal para ciabatta, focaccia romana, panettone y panes rústicos de miga muy alveolada.",
                flavor: "Sabor profundo, ligeramente ácido, con notas lácticas y a frutos secos.",
                ideal: { time: [12, 18], temp: [16, 20] }, origin: "Italia"
            },
            poolish: {
                name: 'Poolish', emoji: '🇫🇷', hydration: 100, noYeast: false,
                desc: "Prefermento líquido al 100% de hidratación, originado en Polonia y popularizado por panaderos franceses. Aporta extensibilidad, ligereza y sabor aromático.",
                tip: "Perfecto para baguettes, pan de molde, brioche y masas que requieran extensión y burbujas finas.",
                flavor: "Suave, dulce, con aromas a fruta fresca y un punto láctico.",
                ideal: { time: [12, 16], temp: [18, 22] }, origin: "Polonia / Francia"
            },
            esponja: {
                name: 'Esponja', emoji: '🍰', hydration: 63, noYeast: false,
                desc: "Prefermento de hidratación intermedia, casi una masa madura. Asegura un arranque potente en masas que cuestan fermentar por su riqueza en grasa o azúcar.",
                tip: "Imprescindible en brioche, pan de leche, panettone, hojaldre fermentado y panes dulces.",
                flavor: "Neutro, suave, con notas a levadura fresca; deja brillar a los enriquecimientos.",
                ideal: { time: [4, 8], temp: [22, 26] }, origin: "Repostería europea"
            },
            masa_madre: {
                name: 'Masa Madre', emoji: '🌾', hydration: 100, noYeast: true,
                desc: "Cultivo simbiótico de levaduras silvestres y bacterias lácticas. Fermenta sin levadura comercial. Requiere una madre activa con duplicación en 4-6h.",
                tip: "Refresca tu madre 8-12h antes y comprueba que duplica antes de incorporar a la masa.",
                flavor: "Complejo, ácido (acético en frío, láctico en calor), con conservación notablemente superior.",
                ideal: { time: [8, 14], temp: [22, 26] }, origin: "Origen ancestral (4000+ años)"
            }
        };

        // ============================================================
        // PRESETS
        // ============================================================
        const PRESETS = [
            { id: 'pan_basico', name: '🍞 Pan básico mismo día',
              config: { doughType: 'pan', flour: 500, hydration: 70, saltPercent: 2, totalTime: 4, temperature: 22, useColdProof: false, prefermentType: 'none' } },
            { id: 'pan_frio', name: '❄️ Pan en frío 24h',
              config: { doughType: 'pan', flour: 500, hydration: 75, saltPercent: 2, temperature: 22, useColdProof: true, coldProofTime: 18, prefermentType: 'none' } },
            { id: 'baguette', name: '🥖 Baguette con poolish',
              config: { doughType: 'pan', flour: 500, hydration: 72, saltPercent: 2, totalTime: 3, temperature: 22, useColdProof: false, prefermentType: 'poolish', prefermentFlourPercent: 30, prefermentTime: 14, prefermentTemp: 20 } },
            { id: 'ciabatta', name: '🧇 Ciabatta con biga',
              config: { doughType: 'pan', flour: 500, hydration: 80, saltPercent: 2.2, totalTime: 3, temperature: 22, useColdProof: false, prefermentType: 'biga', prefermentFlourPercent: 50, prefermentTime: 16, prefermentTemp: 18 } },
            { id: 'pizza_napo', name: '🍕 Pizza napolitana 24h',
              config: { doughType: 'pizza', pizzaBalls: 4, hydration: 62, saltPercent: 2.8, temperature: 22, useColdProof: true, coldProofTime: 24, prefermentType: 'none' } },
            { id: 'brioche', name: '🥐 Brioche con esponja',
              config: { doughType: 'pan', flour: 500, hydration: 60, saltPercent: 1.8, totalTime: 2, temperature: 24, useColdProof: false, prefermentType: 'esponja', prefermentFlourPercent: 25, prefermentTime: 5, prefermentTemp: 25 } },
        ];

        // ============================================================
        // ICONS
        // ============================================================
        const Icon = ({ name, size = 16 }) => {
            const paths = {
                sun: (<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>),
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                printer: (<><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></>),
                copy: (<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>),
                download: (<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>),
                refresh: (<><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>),
                alert: (<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></>),
                check: <polyline points="20 6 9 17 4 12"/>,
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name]}
                </svg>
            );
        };

        // ============================================================
        // SLIDER
        // ============================================================
        const Slider = ({ label, icon, value, onChange, min, max, step, unit, disabled, hint, warning, tip }) => (
            <div className="slider-row">
                <div className={`slider-label ${disabled ? 'disabled' : ''}`}>
                    <span className="slider-label-left">
                        {icon && <span className="ic">{icon}</span>}
                        {label}
                        {tip && <span className="tooltip-trigger" data-tip={tip}>i</span>}
                    </span>
                    <span className={`slider-value-pill ${disabled ? 'disabled' : ''}`}>
                        {value}{unit && ' ' + unit}
                    </span>
                </div>
                <div className="slider-track">
                    <input type="range" min={min} max={max} step={step} value={value}
                        onChange={e => onChange(parseFloat(e.target.value))} disabled={disabled} />
                    <input type="number" value={value} min={min} max={max} step={step}
                        onChange={e => onChange(parseFloat(e.target.value) || 0)} disabled={disabled} />
                </div>
                {hint && !disabled && <div className="slider-hint">{hint}</div>}
                {warning && !disabled && <div className="slider-warning"><Icon name="alert" size={12}/> {warning}</div>}
            </div>
        );

        // ============================================================
        // FORMAT HELPERS
        // ============================================================
        const formatHours = (hours) => {
            if (!hours || hours <= 0) return '—';
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (h === 0) return `${m} min`;
            if (m === 0) return `${h}h`;
            return `${h}h ${m}min`;
        };

        const addHours = (date, hours) => new Date(date.getTime() + hours * 3600000);
        const formatClock = (date) => date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        const formatDay = (date, ref) => {
            const d1 = new Date(date); d1.setHours(0,0,0,0);
            const d2 = new Date(ref); d2.setHours(0,0,0,0);
            const diff = Math.round((d1 - d2) / 86400000);
            if (diff === 0) return '';
            if (diff === -1) return '(día -1)';
            if (diff === -2) return '(día -2)';
            if (diff === 1) return '(día siguiente)';
            return diff > 0 ? `(+${diff}d)` : `(${diff}d)`;
        };

        // ============================================================
        // PREFERMENT INFO
        // ============================================================
        const PrefermentInfo = ({ type }) => {
            const info = PREFERMENTS[type];
            if (!info || type === 'none') return null;
            return (
                <div className="pref-info animate-in">
                    <div className="pref-info-title">
                        <span>{info.name}</span>
                        <div className="pref-info-meta"><span>{info.hydration}%</span></div>
                    </div>
                    {info.desc}
                    <div className="pref-info-tip">💡 {info.tip}</div>
                    <div className="pref-info-flavor">🫙 {info.flavor}</div>
                </div>
            );
        };

        // ============================================================
        // BAKING PLAN
        // ============================================================
        const BakingPlan = ({ plan }) => (
            <div className="bake-card animate-in">
                <div className="bake-header">🔥 Plan de horneado</div>
                <div className="bake-preheat">
                    <span>Precalentamiento</span>
                    <span><span className="pt">{plan.preheat.temp}</span> · {plan.preheat.time}</span>
                </div>
                <div className="bake-note">⚠️ {plan.preheat.notes}</div>
                {plan.phases.map((phase, i) => (
                    <div key={i} className="bake-phase">
                        <div className="bake-phase-title">Fase {i + 1} — {phase.name}</div>
                        <div className="bake-stats">
                            <div className="bake-stat"><div className="v">{phase.temp}</div><div className="l">Temp.</div></div>
                            <div className="bake-stat"><div className="v">{phase.time}</div><div className="l">Tiempo</div></div>
                            <div className="bake-stat"><div className="v" style={{fontSize:'0.78rem'}}>{phase.mode}</div><div className="l">Modo</div></div>
                        </div>
                        <div className="bake-action">{phase.action}</div>
                    </div>
                ))}
                <div className="bake-note">❄️ {plan.cooling}</div>
            </div>
        );

        // ============================================================
        // QUALITY CHECK
        // ============================================================
        const useQualityCheck = (params) => useMemo(() => {
            const issues = [];
            const { doughType, hydration, saltPercent, temperature, totalTime, useColdProof, coldProofTime, prefermentType, prefermentTemp } = params;

            if (doughType === 'pizza' && hydration > 65) issues.push({ level: 'warn', msg: 'Hidratación alta para napolitana tradicional (típico 58-65%).' });
            if (doughType === 'pan' && hydration < 55) issues.push({ level: 'warn', msg: 'Hidratación baja: la miga será densa.' });
            if (doughType === 'pan' && hydration > 85) issues.push({ level: 'warn', msg: 'Hidratación muy alta: requiere técnica avanzada (folds frecuentes, pliegues en frío).' });
            if (saltPercent < 1.5) issues.push({ level: 'warn', msg: 'Poca sal: fermentación demasiado rápida y poco sabor.' });
            if (saltPercent > 3) issues.push({ level: 'warn', msg: 'Demasiada sal: puede inhibir la levadura.' });
            if (temperature < 16) issues.push({ level: 'info', msg: 'Temperatura baja: la fermentación será muy lenta.' });
            if (temperature > 28) issues.push({ level: 'warn', msg: 'Temperatura alta: la masa puede sobrefermentar y desarrollar acidez excesiva.' });
            if (!useColdProof && totalTime < 1.5) issues.push({ level: 'warn', msg: 'Tiempo muy corto: la masa no desarrollará sabor.' });
            if (useColdProof && coldProofTime > 48) issues.push({ level: 'info', msg: 'Frío muy largo: vigila signos de sobrefermentación al sacar.' });

            if (prefermentType !== 'none' && prefermentType !== 'masa_madre') {
                const ideal = PREFERMENTS[prefermentType].ideal;
                if (prefermentTemp < ideal.temp[0] - 2) issues.push({ level: 'info', msg: `${PREFERMENTS[prefermentType].name}: temperatura por debajo del rango ideal (${ideal.temp[0]}-${ideal.temp[1]}°C).` });
                if (prefermentTemp > ideal.temp[1] + 2) issues.push({ level: 'warn', msg: `${PREFERMENTS[prefermentType].name}: temperatura por encima del rango ideal, riesgo de sobrefermentación.` });
            }

            let score = 5;
            issues.forEach(i => {
                if (i.level === 'bad') score -= 2;
                else if (i.level === 'warn') score -= 1;
            });
            return { issues, score: clamp(score, 1, 5) };
        }, [params]);

        // ============================================================
        // MAIN APP
        // ============================================================
        // Default values for reset
        const DEFAULTS = {
            doughType: 'pan', flour: 500, pizzaBalls: 4,
            hydration: 70, saltPercent: 2, totalTime: 4,
            temperature: 22, useColdProof: false, coldProofTime: 18,
            prefermentType: 'none', prefermentFlourPercent: 30,
            prefermentTime: 14, prefermentTemp: 20,
        };

        // Load saved state from localStorage
        const loadSaved = () => {
            try {
                const saved = localStorage.getItem('fermCalcState');
                return saved ? { ...DEFAULTS, ...JSON.parse(saved) } : DEFAULTS;
            } catch (e) { return DEFAULTS; }
        };

        const App = () => {
            const [theme, setTheme] = useState(() => {
                if (typeof localStorage !== 'undefined') {
                    return localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                }
                return 'light';
            });
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                if (typeof localStorage !== 'undefined') localStorage.setItem('theme', theme);
            }, [theme]);

            const initial = loadSaved();
            const [doughType, setDoughType]                   = useState(initial.doughType);
            const [flour, setFlour]                           = useState(initial.flour);
            const [pizzaBalls, setPizzaBalls]                 = useState(initial.pizzaBalls);
            const [hydration, setHydration]                   = useState(initial.hydration);
            const [saltPercent, setSaltPercent]               = useState(initial.saltPercent);
            const [totalTime, setTotalTime]                   = useState(initial.totalTime);
            const [temperature, setTemperature]               = useState(initial.temperature);
            const [useColdProof, setUseColdProof]             = useState(initial.useColdProof);
            const [coldProofTime, setColdProofTime]           = useState(initial.coldProofTime);
            const [prefermentType, setPrefermentType]         = useState(initial.prefermentType);
            const [prefermentFlourPercent, setPrefermentFlourPercent] = useState(initial.prefermentFlourPercent);
            const [prefermentTime, setPrefermentTime]         = useState(initial.prefermentTime);
            const [prefermentTemp, setPrefermentTemp]         = useState(initial.prefermentTemp);
            const [activePreset, setActivePreset]             = useState(null);
            const [activeTab, setActiveTab]                   = useState('recipe');
            const [toast, setToast]                           = useState(null);
            const [presetModified, setPresetModified]         = useState(false);
            const [bakeTime, setBakeTime] = useState(() => {
                const t = new Date(); t.setHours(18, 0, 0, 0);
                return t.toTimeString().slice(0, 5);
            });

            // Show toast helper
            const showToast = useCallback((msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2200);
            }, []);

            // Persist state to localStorage
            useEffect(() => {
                try {
                    localStorage.setItem('fermCalcState', JSON.stringify({
                        doughType, flour, pizzaBalls, hydration, saltPercent, totalTime,
                        temperature, useColdProof, coldProofTime, prefermentType,
                        prefermentFlourPercent, prefermentTime, prefermentTemp
                    }));
                } catch (e) {}
            }, [doughType, flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp]);

            // Reset to defaults
            const resetAll = () => {
                if (!window.confirm('¿Restablecer todos los parámetros a los valores por defecto?')) return;
                Object.entries(DEFAULTS).forEach(([k, v]) => {
                    const setter = {
                        doughType: setDoughType, flour: setFlour, pizzaBalls: setPizzaBalls,
                        hydration: setHydration, saltPercent: setSaltPercent, totalTime: setTotalTime,
                        temperature: setTemperature, useColdProof: setUseColdProof,
                        coldProofTime: setColdProofTime, prefermentType: setPrefermentType,
                        prefermentFlourPercent: setPrefermentFlourPercent,
                        prefermentTime: setPrefermentTime, prefermentTemp: setPrefermentTemp
                    }[k];
                    if (setter) setter(v);
                });
                setActivePreset(null);
                setPresetModified(false);
                showToast('Valores restablecidos');
            };

            const DOUGHBALL_WEIGHT = 260;

            const applyPreset = useCallback((preset) => {
                const c = preset.config;
                if (c.doughType !== undefined) setDoughType(c.doughType);
                if (c.flour !== undefined) setFlour(c.flour);
                if (c.pizzaBalls !== undefined) setPizzaBalls(c.pizzaBalls);
                if (c.hydration !== undefined) setHydration(c.hydration);
                if (c.saltPercent !== undefined) setSaltPercent(c.saltPercent);
                if (c.totalTime !== undefined) setTotalTime(c.totalTime);
                if (c.temperature !== undefined) setTemperature(c.temperature);
                setUseColdProof(c.useColdProof || false);
                if (c.coldProofTime !== undefined) setColdProofTime(c.coldProofTime);
                setPrefermentType(c.prefermentType || 'none');
                if (c.prefermentFlourPercent !== undefined) setPrefermentFlourPercent(c.prefermentFlourPercent);
                if (c.prefermentTime !== undefined) setPrefermentTime(c.prefermentTime);
                if (c.prefermentTemp !== undefined) setPrefermentTemp(c.prefermentTemp);
                setTimeout(() => {
                    setActivePreset(preset.id);
                    setPresetModified(false);
                }, 0);
                showToast(`Aplicado: ${preset.name}`);
            }, [showToast]);

            useEffect(() => {
                if (activePreset) {
                    // Check if current state matches the preset
                    const preset = PRESETS.find(p => p.id === activePreset);
                    if (preset) {
                        const c = preset.config;
                        const matches =
                            (c.doughType === undefined || c.doughType === doughType) &&
                            (c.flour === undefined || c.flour === flour) &&
                            (c.pizzaBalls === undefined || c.pizzaBalls === pizzaBalls) &&
                            (c.hydration === undefined || c.hydration === hydration) &&
                            (c.saltPercent === undefined || c.saltPercent === saltPercent) &&
                            (c.totalTime === undefined || c.totalTime === totalTime) &&
                            (c.temperature === undefined || c.temperature === temperature) &&
                            ((c.useColdProof || false) === useColdProof) &&
                            (c.coldProofTime === undefined || c.coldProofTime === coldProofTime) &&
                            ((c.prefermentType || 'none') === prefermentType) &&
                            (c.prefermentFlourPercent === undefined || c.prefermentFlourPercent === prefermentFlourPercent) &&
                            (c.prefermentTime === undefined || c.prefermentTime === prefermentTime) &&
                            (c.prefermentTemp === undefined || c.prefermentTemp === prefermentTemp);
                        setPresetModified(!matches);
                    }
                }
            // eslint-disable-next-line
            }, [flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp, doughType]);

            useEffect(() => {
                if (doughType === 'pizza' && hydration > 70) setHydration(62);
            // eslint-disable-next-line
            }, [doughType]);

            // ─── COMPUTATION ─────────────────────────────────────────
            const calc = useMemo(() => {
                const currentFlour = doughType === 'pan'
                    ? flour
                    : (pizzaBalls * DOUGHBALL_WEIGHT) / ((100 + hydration + saltPercent) / 100);

                const usePref = prefermentType !== 'none';
                const cfg = PREFERMENTS[prefermentType];
                let prefFlour = 0, prefWater = 0, prefYeast = 0;
                let finalFlour = currentFlour;
                let finalWater = currentFlour * (hydration / 100);

                if (usePref) {
                    prefFlour = currentFlour * (prefermentFlourPercent / 100);
                    prefWater = prefFlour * (cfg.hydration / 100);
                    finalFlour = currentFlour - prefFlour;
                    finalWater = currentFlour * (hydration / 100) - prefWater;

                    if (!cfg.noYeast && prefermentTime > 0) {
                        let pYP = yeastForTime(prefermentTime, prefermentTemp);
                        pYP = clamp(pYP, 0.02, 1);
                        prefYeast = prefFlour * (pYP / 100);
                    }
                }

                let yeastPercent = 0, ambientH = 0, coldH = 0;
                if (useColdProof) {
                    ambientH = clamp(1.5 / rateFactor(temperature), 0.5, 3);
                    coldH = coldProofTime;
                    yeastPercent = yeastForBulk(ambientH, coldH, temperature);
                } else {
                    ambientH = totalTime;
                    yeastPercent = yeastForTime(totalTime, temperature);
                }
                yeastPercent = clamp(yeastPercent, 0.01, 5);

                if (usePref && !cfg.noYeast) {
                    const prefContribution = (prefermentFlourPercent / 100) * 0.5;
                    yeastPercent = yeastPercent * (1 - prefContribution);
                    yeastPercent = clamp(yeastPercent, 0.01, 5);
                }
                if (usePref && cfg.noYeast) yeastPercent = 0;

                const yeastGrams = finalFlour * (yeastPercent / 100);
                const saltGrams = currentFlour * (saltPercent / 100);

                const temperingTime = useColdProof
                    ? (currentFlour <= 750 ? 1.5 : currentFlour <= 1500 ? 2.5 : 3.5) / rateFactor(temperature)
                    : 0;

                const finalProofTime = (1.5 / rateFactor(temperature)) * (useColdProof ? 1.2 : 1);

                const bakingPlan = (() => {
                    if (doughType === 'pizza') return {
                        preheat: { temp: 'Máxima (250-300°C)', time: '45-60 min', notes: 'Imprescindible piedra o acero refractario dentro del horno desde el inicio.' },
                        phases: [{
                            name: 'Cocción rápida',
                            temp: 'Máx.', time: '5-8 min', mode: 'Grill + suelo',
                            action: 'Pizza directa sobre la piedra ardiendo. La cocción es muy rápida: vigila el burbujeo y el dorado del cornicione.'
                        }],
                        cooling: 'Servir al instante para mantener la masa elástica y los bordes crujientes.'
                    };

                    const tf = 1 + ((currentFlour - 500) / 500) * 0.25;

                    if (prefermentType === 'esponja') return {
                        preheat: { temp: '180°C', time: '20 min', notes: 'Temperatura moderada porque las grasas y azúcares aceleran el dorado.' },
                        phases: [{
                            name: 'Horneado completo',
                            temp: '180°C', time: `${Math.round(35 * tf)}-${Math.round(45 * tf)} min`, mode: 'Calor arriba/abajo',
                            action: 'Hornea hasta dorado profundo. Si se dora demasiado por arriba, cubre con papel de aluminio los últimos 10-15 minutos. Tester: 92-95°C de temperatura interna.'
                        }],
                        cooling: 'Enfría completamente sobre rejilla (mínimo 1h) antes de cortar para que la miga asiente.'
                    };

                    const high = hydration > 78;
                    return {
                        preheat: { temp: high ? '250°C' : '240°C', time: '45-60 min', notes: 'Crítico: precalienta con la dutch oven o piedra dentro para acumular calor.' },
                        phases: [
                            {
                                name: 'Salto y expansión (con vapor)',
                                temp: high ? '250°C' : '240°C',
                                time: high ? `${Math.round(20 * tf)}-${Math.round(22 * tf)} min` : `${Math.round(15 * tf)}-${Math.round(20 * tf)} min`,
                                mode: 'Calor arriba/abajo',
                                action: 'Hornea tapado en la dutch oven (o crea vapor con bandeja de hielo). El vapor mantiene la corteza elástica para que el pan rompa por las greñas y suba al máximo.'
                            },
                            {
                                name: 'Corteza y color',
                                temp: high ? '230°C' : '210°C',
                                time: high ? `${Math.round(18 * tf)}-${Math.round(22 * tf)} min` : `${Math.round(20 * tf)}-${Math.round(25 * tf)} min`,
                                mode: 'Calor arriba/abajo',
                                action: 'Destapa o retira la fuente de vapor. La corteza se oscurece y crujifica. Busca un caoba profundo. Temp. interna 96-99°C.'
                            }
                        ],
                        cooling: 'Esencial: mínimo 2h sobre rejilla antes de cortar. La miga sigue cocinándose con el vapor interno y el sabor termina de desarrollarse.'
                    };
                })();

                const totalDough = currentFlour + (currentFlour * hydration / 100) + saltGrams + yeastGrams + prefYeast;

                return {
                    currentFlour, finalFlour, finalWater, prefFlour, prefWater, prefYeast,
                    yeastPercent, yeastGrams, saltGrams,
                    ambientH, coldH, temperingTime, finalProofTime,
                    bakingPlan, totalDough,
                };
            }, [doughType, flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp]);

            const quality = useQualityCheck({ doughType, hydration, saltPercent, temperature, totalTime, useColdProof, coldProofTime, prefermentType, prefermentTemp });

            // Difficulty score (1-5)
            const difficulty = useMemo(() => {
                let score = 1;
                if (hydration > 75) score++;
                if (hydration > 85) score++;
                if (useColdProof) score++;
                if (prefermentType !== 'none') score++;
                if (prefermentType === 'masa_madre') score++;
                if (doughType === 'pizza') score++;
                return clamp(score, 1, 5);
            }, [hydration, useColdProof, prefermentType, doughType]);
            const difficultyLabel = ['', 'Principiante', 'Fácil', 'Intermedio', 'Avanzado', 'Experto'][difficulty];

            // ─── SCHEDULE ────────────────────────────────────────────
            const schedule = useMemo(() => {
                const [bh, bm] = bakeTime.split(':').map(Number);
                const bake = new Date();
                bake.setHours(bh, bm, 0, 0);
                if (bake < new Date()) bake.setDate(bake.getDate() + 1);

                const events = [];
                events.push({ time: new Date(bake), name: 'Hornear', desc: 'El pan entra al horno precalentado', icon: '🔥', kind: 'bake' });

                let cursor = new Date(bake);
                // Final proof
                cursor = addHours(cursor, -calc.finalProofTime);
                events.push({ time: new Date(cursor), name: 'Levado final', desc: doughType === 'pizza' ? 'Bolea las pizzas y deja reposar' : 'En banneton o molde, hasta ~70% de aumento', icon: '🫓', kind: 'normal', dur: calc.finalProofTime });

                // Bench rest before final proof (only for pan, not pizza)
                if (doughType === 'pan') {
                    const benchRest = 0.4; // ~25 min
                    cursor = addHours(cursor, -benchRest);
                    events.push({ time: new Date(cursor), name: 'Boleado y reposo', desc: 'Preforma, deja relajar 20-30 min, luego forma definitiva', icon: '🤲', kind: 'normal', dur: benchRest });
                }

                if (useColdProof) {
                    if (calc.temperingTime > 0) {
                        cursor = addHours(cursor, -calc.temperingTime);
                        events.push({ time: new Date(cursor), name: 'Atemperar', desc: 'Saca de la nevera, deja que pierda el frío', icon: '☀️', kind: 'normal', dur: calc.temperingTime });
                    }
                    cursor = addHours(cursor, -calc.coldH);
                    events.push({ time: new Date(cursor), name: 'A la nevera', desc: `Retardo en frío a ${FRIDGE_TEMP}°C — desarrolla sabor`, icon: '❄️', kind: 'cold', dur: calc.coldH });

                    // Folds during bulk if hydration is high
                    if (hydration >= 70 && calc.ambientH >= 1) {
                        const foldsCount = hydration >= 80 ? 4 : 3;
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Mezcla + bulk con pliegues', desc: `${foldsCount} pliegues cada 30 min durante la fermentación a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    } else {
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Mezcla y bulk corto', desc: `Fermentación a ${temperature}°C antes del frío`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    }
                } else {
                    // Folds during bulk if hydration is high
                    if (hydration >= 70 && calc.ambientH >= 2) {
                        const foldsCount = hydration >= 80 ? 4 : 3;
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Bulk con pliegues', desc: `${foldsCount} pliegues cada ${Math.round(calc.ambientH * 60 / (foldsCount + 1))} min a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    } else {
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Bulk principal', desc: `Fermentación en bloque a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    }
                }

                // Autolisis only suggested for high hydration breads
                if (doughType === 'pan' && hydration >= 75) {
                    const autolyse = 0.5;
                    cursor = addHours(cursor, -autolyse);
                    events.push({ time: new Date(cursor), name: 'Autólisis', desc: 'Mezcla harina + agua, deja reposar 30 min antes de añadir sal y levadura', icon: '💧', kind: 'normal', dur: autolyse });
                }

                events.push({ time: new Date(cursor), name: 'Empezar aquí', desc: prefermentType !== 'none' ? 'Mezcla la masa final con el prefermento ya activo' : 'Pesa los ingredientes y comienza', icon: '👐', kind: 'start' });

                if (prefermentType !== 'none') {
                    cursor = addHours(cursor, -prefermentTime);
                    const desc = PREFERMENTS[prefermentType].noYeast
                        ? `${prefermentTime}h a ${prefermentTemp}°C — refresca tu masa madre`
                        : `${prefermentTime}h a ${prefermentTemp}°C en bote tapado`;
                    events.push({ time: new Date(cursor), name: `Preparar ${PREFERMENTS[prefermentType].name}`, desc, icon: '🌿', kind: 'normal', dur: prefermentTime });
                }

                return events.reverse();
            }, [bakeTime, calc, useColdProof, temperature, prefermentType, prefermentTime, prefermentTemp, doughType, hydration]);

            // ─── RECIPE TEXT ─────────────────────────────────────────
            const recipeText = useMemo(() => {
                const lines = [];
                lines.push(`RECETA — ${doughType === 'pizza' ? 'Pizza' : 'Pan'}${prefermentType !== 'none' ? ' con ' + PREFERMENTS[prefermentType].name : ''}`);
                lines.push('═══════════════════════════');
                if (prefermentType !== 'none') {
                    lines.push(`\n${PREFERMENTS[prefermentType].name} (${prefermentTime}h a ${prefermentTemp}°C):`);
                    lines.push(`  Harina: ${round(calc.prefFlour)}g`);
                    lines.push(`  Agua: ${round(calc.prefWater)}g`);
                    if (calc.prefYeast > 0) lines.push(`  Levadura seca: ${round(calc.prefYeast, 2)}g`);
                    if (PREFERMENTS[prefermentType].noYeast) lines.push(`  Masa madre activa: ${round(calc.prefFlour * 0.4)}g aprox`);
                }
                lines.push(`\nMasa final:`);
                lines.push(`  Harina: ${round(calc.finalFlour)}g`);
                lines.push(`  Agua: ${round(calc.finalWater)}g`);
                lines.push(`  Sal: ${round(calc.saltGrams, 1)}g`);
                if (calc.yeastGrams > 0) lines.push(`  Levadura seca: ${round(calc.yeastGrams, 2)}g`);
                lines.push(`\nTotales: ${round(calc.currentFlour)}g harina · ${hydration}% hidratación · ${saltPercent}% sal`);
                lines.push(`\nFermentación:`);
                if (useColdProof) {
                    lines.push(`  • Bulk corto: ${formatHours(calc.ambientH)} a ${temperature}°C`);
                    lines.push(`  • Frío: ${formatHours(calc.coldH)} a ${FRIDGE_TEMP}°C`);
                    if (calc.temperingTime > 0) lines.push(`  • Atemperar: ${formatHours(calc.temperingTime)}`);
                } else {
                    lines.push(`  • Bulk: ${formatHours(calc.ambientH)} a ${temperature}°C`);
                }
                lines.push(`  • Levado final: ${formatHours(calc.finalProofTime)}`);
                return lines.join('\n');
            }, [calc, doughType, prefermentType, prefermentTime, prefermentTemp, hydration, saltPercent, useColdProof, temperature]);

            const copyRecipe = () => {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(recipeText).then(() => {
                        showToast('Receta copiada al portapapeles ✓');
                    }).catch(() => {
                        showToast('Error al copiar');
                    });
                } else {
                    showToast('Portapapeles no disponible');
                }
            };

            const downloadRecipe = () => {
                const blob = new Blob([recipeText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `receta-${doughType}-${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Receta descargada ✓');
            };

            const totalTimeAll = useMemo(() => {
                let t = calc.finalProofTime;
                if (doughType === 'pan') t += 0.4; // bench rest
                if (useColdProof) {
                    t += calc.ambientH + calc.coldH + calc.temperingTime;
                } else {
                    t += calc.ambientH;
                }
                if (doughType === 'pan' && hydration >= 75) t += 0.5; // autolysis
                if (prefermentType !== 'none') t += prefermentTime;
                return t;
            }, [calc, useColdProof, prefermentType, prefermentTime, doughType, hydration]);

            return (
                <>
                    <header className="app-header">
                        <div className="brand">
                            <div className="brand-mark">F</div>
                            <div className="brand-text">
                                <h1>Calculadora de Fermentación</h1>
                                <p>Panadería artesanal · cálculo asistido</p>
                            </div>
                        </div>
                        <div className="header-actions">
                            <button className="icon-btn" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                                title={theme === 'light' ? 'Modo oscuro' : 'Modo claro'}>
                                <Icon name={theme === 'light' ? 'moon' : 'sun'} />
                            </button>
                            <button className="icon-btn" onClick={copyRecipe} title="Copiar receta">
                                <Icon name="copy" /> <span>Copiar</span>
                            </button>
                            <button className="icon-btn" onClick={downloadRecipe} title="Descargar receta como .txt">
                                <Icon name="download" />
                            </button>
                            <button className="icon-btn" onClick={() => window.print()} title="Imprimir">
                                <Icon name="printer" />
                            </button>
                        </div>
                    </header>

                    <div className="app-body">
                        {/* HERO STRIP */}
                        <div className="hero-strip">
                            <div className="hero-stat">
                                <div className="label">Harina total</div>
                                <div className="value">{Math.round(calc.currentFlour)}<span className="unit">g</span></div>
                            </div>
                            <div className="hero-stat">
                                <div className="label">Hidratación</div>
                                <div className="value">{hydration}<span className="unit">%</span></div>
                            </div>
                            <div className="hero-stat">
                                <div className="label">Levadura</div>
                                <div className="value">
                                    {calc.yeastGrams > 0 ? round(calc.yeastGrams, 2) : '—'}
                                    {calc.yeastGrams > 0 && <span className="unit">g</span>}
                                </div>
                            </div>
                            <div className="hero-stat">
                                <div className="label">Tiempo total</div>
                                <div className="value">{formatHours(totalTimeAll)}</div>
                            </div>
                            <div className="hero-stat">
                                <div className="label">Masa total</div>
                                <div className="value">{Math.round(calc.totalDough)}<span className="unit">g</span></div>
                            </div>
                        </div>

                        {/* DIFFICULTY + RESET */}
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem'}}>
                            <div className="difficulty">
                                <span>Dificultad:</span>
                                <div className="difficulty-bars">
                                    {[1,2,3,4,5].map(n => (
                                        <span key={n} className={`db ${n <= difficulty ? 'on' : ''}`}></span>
                                    ))}
                                </div>
                                <span style={{color: 'var(--text-soft)', fontWeight: 600}}>{difficultyLabel}</span>
                            </div>
                            <button className="reset-link" onClick={resetAll}>↻ Restablecer valores</button>
                        </div>

                        {/* PRESETS */}
                        <div className="presets-row">
                            {PRESETS.map(p => (
                                <button key={p.id}
                                    className={`preset-btn ${activePreset === p.id ? 'active' : ''}`}
                                    onClick={() => applyPreset(p)}>
                                    {p.name}
                                    {activePreset === p.id && presetModified && (
                                        <span className="modified-badge">modif.</span>
                                    )}
                                </button>
                            ))}
                        </div>

                        <div className="two-col">
                            {/* ─── LEFT: CONTROLS ─── */}
                            <div className="card">
                                {/* Tipo de masa */}
                                <div className="section">
                                    <div className="section-label"><span className="step-num">1</span> Tipo de masa</div>
                                    <div className="dough-toggle">
                                        <button className={`dough-btn ${doughType === 'pan' ? 'active' : ''}`}
                                            onClick={() => setDoughType('pan')}>
                                            <span className="top"><span className="emoji">🍞</span> Pan</span>
                                            <span className="sub">Hogazas, baguettes, brioche</span>
                                        </button>
                                        <button className={`dough-btn ${doughType === 'pizza' ? 'active' : ''}`}
                                            onClick={() => setDoughType('pizza')}>
                                            <span className="top"><span className="emoji">🍕</span> Pizza Napolitana</span>
                                            <span className="sub">Bolas de 260g</span>
                                        </button>
                                    </div>
                                </div>

                                {/* Cantidad e ingredientes */}
                                <div className="section">
                                    <div className="section-label"><span className="step-num">2</span> Cantidad e ingredientes</div>
                                    <div className="slider-group">
                                        {doughType === 'pan' ? (
                                            <Slider label="Harina total" icon="🌾" value={flour} onChange={setFlour}
                                                min="100" max="2000" step="50" unit="g" />
                                        ) : (
                                            <Slider label="Número de bolas" icon="🍕" value={pizzaBalls} onChange={setPizzaBalls}
                                                min="1" max="20" step="1" unit="bolas"
                                                hint="Cada bola → 260g de masa lista" />
                                        )}
                                        <Slider label="Hidratación final" icon="💧" value={hydration} onChange={setHydration}
                                            min={doughType === 'pizza' ? 55 : 50}
                                            max={doughType === 'pizza' ? 75 : 100}
                                            step="1" unit="%"
                                            tip="Porcentaje de agua sobre el peso de la harina total. A más hidratación, miga más abierta y alveolada, pero más difícil de manejar."
                                            hint={doughType === 'pizza'
                                                ? 'Napolitana clásica: 58-65%'
                                                : hydration < 65 ? 'Miga densa, fácil de manipular'
                                                : hydration < 75 ? 'Equilibrio clásico, buen alveolado'
                                                : hydration < 85 ? 'Miga abierta, requiere folds'
                                                : 'Hidratación alta, técnica avanzada'} />
                                        <Slider label="Sal" icon="🧂" value={saltPercent} onChange={setSaltPercent}
                                            min="1" max="3.5" step="0.1" unit="%"
                                            tip="Sobre el peso de la harina total. La sal controla la fermentación y aporta sabor. Menos de 1.5% acelera demasiado; más de 3% inhibe la levadura."
                                            hint="Estándar: 1.8-2.2% · pizza napolitana: 2.5-3%" />
                                        <Slider label="Temperatura ambiente" icon="🌡️" value={temperature} onChange={setTemperature}
                                            min="4" max="32" step="1" unit="°C"
                                            tip="Q10 es la regla biológica que dice que la actividad enzimática se duplica cada 10°C. Para la levadura: a 32°C fermenta el doble que a 22°C."
                                            hint={`Q10≈2: ${temperature < 22 ? 'fermenta más lento' : temperature > 22 ? 'fermenta más rápido' : 'velocidad de referencia'} que a 22°C`} />
                                    </div>
                                </div>

                                {/* Prefermento */}
                                <div className="section">
                                    <div className="section-label"><span className="step-num">3</span> Prefermento (opcional)</div>
                                    <div className="pref-grid">
                                        {Object.entries(PREFERMENTS).map(([key, p]) => (
                                            <button key={key}
                                                className={`pref-pill ${prefermentType === key ? 'active' : ''}`}
                                                onClick={() => setPrefermentType(key)}>
                                                <span className="e">{p.emoji}</span>
                                                <span>{p.name}</span>
                                                {p.hydration && <span className="h">{p.hydration}%</span>}
                                            </button>
                                        ))}
                                    </div>
                                    <PrefermentInfo type={prefermentType} />
                                    {prefermentType !== 'none' && (
                                        <div className="indent-group">
                                            <Slider label="% Harina en prefermento" icon="↳" value={prefermentFlourPercent}
                                                onChange={setPrefermentFlourPercent} min="20" max="50" step="5" unit="%" />
                                            <Slider label="Tiempo de levado" icon="⏰" value={prefermentTime}
                                                onChange={setPrefermentTime} min="4" max="24" step="1" unit="hrs" />
                                            <Slider label="Temperatura del prefermento" icon="🌡️" value={prefermentTemp}
                                                onChange={setPrefermentTemp} min="4" max="30" step="1" unit="°C" />
                                        </div>
                                    )}
                                </div>

                                {/* Fermentación */}
                                <div className="section">
                                    <div className="section-label"><span className="step-num">4</span> Plan de fermentación</div>
                                    <div className="toggle-row">
                                        <span className="toggle-label">❄️ Levado en frío (nevera)</span>
                                        <label className="toggle-switch">
                                            <input type="checkbox" checked={useColdProof}
                                                onChange={e => setUseColdProof(e.target.checked)} />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                    <div style={{marginTop: '0.85rem', display: 'flex', flexDirection: 'column', gap: '1rem'}}>
                                        {useColdProof && (
                                            <Slider label="Tiempo en frío" icon="❄️" value={coldProofTime}
                                                onChange={setColdProofTime} min="8" max="72" step="1" unit="hrs" />
                                        )}
                                        <Slider label="Levado a temperatura ambiente" icon="⏰" value={totalTime}
                                            onChange={setTotalTime} min="1" max="12" step="0.5" unit="hrs"
                                            disabled={useColdProof}
                                            hint={useColdProof ? 'El bulk se calcula automáticamente al activar levado en frío' : ''} />
                                    </div>
                                </div>
                            </div>

                            {/* ─── RIGHT: RESULTS ─── */}
                            <div className="card">
                                <div className="tabs">
                                    <button className={`tab ${activeTab === 'recipe' ? 'active' : ''}`} onClick={() => setActiveTab('recipe')}>📋 Receta</button>
                                    <button className={`tab ${activeTab === 'schedule' ? 'active' : ''}`} onClick={() => setActiveTab('schedule')}>⏱ Cronograma</button>
                                    <button className={`tab ${activeTab === 'baking' ? 'active' : ''}`} onClick={() => setActiveTab('baking')}>🔥 Horneado</button>
                                </div>

                                {quality.issues.length > 0 && (
                                    <div className="quality-bar">
                                        <span style={{fontWeight: 600}}>Calidad:</span>
                                        <div className="quality-dots">
                                            {[1,2,3,4,5].map(n => (
                                                <span key={n} className={`qd ${n <= quality.score ? (quality.score >= 4 ? 'on' : quality.score >= 3 ? 'warn' : 'bad') : ''}`}></span>
                                            ))}
                                        </div>
                                        <span style={{color: 'var(--text-muted)', fontSize: '0.76rem'}}>
                                            {quality.issues.length} ajuste{quality.issues.length !== 1 ? 's' : ''} sugerido{quality.issues.length !== 1 ? 's' : ''}
                                        </span>
                                    </div>
                                )}

                                {quality.issues.filter(i => i.level === 'warn').slice(0, 2).map((iss, i) => (
                                    <div key={i} className="warn-box">
                                        <Icon name="alert" /> <span>{iss.msg}</span>
                                    </div>
                                ))}

                                {/* RECIPE TAB */}
                                {activeTab === 'recipe' && (
                                    <div className="animate-in">
                                        {prefermentType !== 'none' && (
                                            <div className="pref-box">
                                                <div className="pref-box-header">
                                                    <span>🌿 {PREFERMENTS[prefermentType].name}</span>
                                                    <span style={{opacity: 0.85}}>{prefermentTime}h · {prefermentTemp}°C</span>
                                                </div>
                                                <div className="pref-box-body">
                                                    <div className="ing-grid" style={{marginBottom: 0}}>
                                                        <div className="ing-card"><div className="l">Harina</div><div className="v">{round(calc.prefFlour)}</div><div className="u">gramos</div></div>
                                                        <div className="ing-card"><div className="l">Agua ({PREFERMENTS[prefermentType].hydration}%)</div><div className="v">{round(calc.prefWater)}</div><div className="u">gramos</div></div>
                                                        {PREFERMENTS[prefermentType].noYeast ? (
                                                            <div className="ing-card"><div className="l">Masa madre</div><div className="v">{round(calc.prefFlour * 0.4)}</div><div className="u">g (aprox.)</div></div>
                                                        ) : (
                                                            <div className="ing-card"><div className="l">Levadura seca</div><div className="v">{round(calc.prefYeast, 2)}</div><div className="u">gramos</div></div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div style={{fontFamily: 'Fraunces, serif', fontSize: '0.95rem', fontWeight: 500, marginBottom: '0.6rem', color: 'var(--accent)'}}>
                                            {prefermentType !== 'none' ? '🍞 Masa final (resto)' : '🍞 Masa'}
                                        </div>
                                        <div className="ing-grid">
                                            <div className="ing-card"><div className="l">Harina</div><div className="v">{round(calc.finalFlour)}</div><div className="u">gramos</div></div>
                                            <div className="ing-card"><div className="l">Agua</div><div className="v">{round(calc.finalWater)}</div><div className="u">gramos</div></div>
                                            <div className="ing-card"><div className="l">Sal ({saltPercent}%)</div><div className="v">{round(calc.saltGrams, 1)}</div><div className="u">gramos</div></div>
                                        </div>

                                        {calc.yeastGrams > 0 && (
                                            <div className="yeast-card">
                                                <div className="l">⚖️ Levadura seca instantánea</div>
                                                <div className="v">{round(calc.yeastGrams, 2)}g</div>
                                                <div className="u">{round(calc.yeastPercent, 2)}% sobre harina · ×3 si fresca</div>
                                                <div className="tiny">Si solo tienes levadura fresca prensada, multiplica por 3 (≈{round(calc.yeastGrams * 3, 1)}g)</div>
                                            </div>
                                        )}

                                        <div className="info-note">
                                            <strong>Total de la masa:</strong> {round(calc.totalDough)}g
                                            {doughType === 'pizza' && ` · ${pizzaBalls} bolas de ~${DOUGHBALL_WEIGHT}g`}
                                            <br/><strong>Hidratación efectiva:</strong> {hydration}% · <strong>Sal:</strong> {saltPercent}% del peso de harina
                                        </div>

                                        {/* Visual indicators */}
                                        <div style={{marginTop: '1rem'}}>
                                            <div style={{fontFamily: 'Fraunces, serif', fontSize: '0.95rem', fontWeight: 500, marginBottom: '0.6rem', color: 'var(--accent)'}}>
                                                👁️ Cómo saber si está lista
                                            </div>
                                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '0.5rem'}}>
                                                <div style={{background: 'var(--surface-2)', padding: '0.7rem', borderRadius: 'var(--radius-sm)', fontSize: '0.78rem', lineHeight: 1.45}}>
                                                    <strong style={{color: 'var(--accent)'}}>🥣 Bulk</strong>
                                                    <div style={{color: 'var(--text-soft)', marginTop: '0.2rem'}}>
                                                        +60-75% volumen, jiggly al mover, burbujas en superficie y laterales del bote.
                                                    </div>
                                                </div>
                                                <div style={{background: 'var(--surface-2)', padding: '0.7rem', borderRadius: 'var(--radius-sm)', fontSize: '0.78rem', lineHeight: 1.45}}>
                                                    <strong style={{color: 'var(--accent)'}}>🫓 Levado final</strong>
                                                    <div style={{color: 'var(--text-soft)', marginTop: '0.2rem'}}>
                                                        Poke test: presiona y la marca debe rebotar lentamente y dejar leve hueco.
                                                    </div>
                                                </div>
                                                {doughType === 'pan' && (
                                                    <div style={{background: 'var(--surface-2)', padding: '0.7rem', borderRadius: 'var(--radius-sm)', fontSize: '0.78rem', lineHeight: 1.45}}>
                                                        <strong style={{color: 'var(--accent)'}}>🍞 Horneado</strong>
                                                        <div style={{color: 'var(--text-soft)', marginTop: '0.2rem'}}>
                                                            Caoba profundo, base hueca al golpear, 96-99°C interior.
                                                        </div>
                                                    </div>
                                                )}
                                                {doughType === 'pizza' && (
                                                    <div style={{background: 'var(--surface-2)', padding: '0.7rem', borderRadius: 'var(--radius-sm)', fontSize: '0.78rem', lineHeight: 1.45}}>
                                                        <strong style={{color: 'var(--accent)'}}>🍕 Pizza</strong>
                                                        <div style={{color: 'var(--text-soft)', marginTop: '0.2rem'}}>
                                                            Cornicione hinchado con leoparding (manchitas oscuras) y queso fundido.
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* SCHEDULE TAB */}
                                {activeTab === 'schedule' && (
                                    <div className="animate-in">
                                        <div className="schedule-input">
                                            <label>🔥 ¿A qué hora quieres hornear?</label>
                                            <input type="time" value={bakeTime} onChange={e => setBakeTime(e.target.value)} />
                                        </div>
                                        <div className="schedule">
                                            {schedule.map((ev, i) => (
                                                <div key={i} className={`schedule-row ${ev.kind}`}>
                                                    <div className="schedule-time">
                                                        {formatClock(ev.time)}
                                                        <div style={{fontSize: '0.65rem', color: 'var(--text-muted)', fontWeight: 400, fontFamily: 'Inter'}}>
                                                            {formatDay(ev.time, schedule[schedule.length-1].time)}
                                                        </div>
                                                    </div>
                                                    <div className="schedule-step">
                                                        <div className="name">
                                                            <span className="ic">{ev.icon}</span>
                                                            {ev.name}
                                                        </div>
                                                        <div className="desc">{ev.desc}</div>
                                                    </div>
                                                    <div className="schedule-duration">
                                                        {ev.dur ? formatHours(ev.dur) : ''}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="info-note">
                                            <strong>Cronograma calculado hacia atrás</strong> desde tu hora de horneado.
                                            Ajusta la hora arriba para ver cuándo empezar.
                                        </div>
                                    </div>
                                )}

                                {/* BAKING TAB */}
                                {activeTab === 'baking' && (
                                    <div className="animate-in">
                                        <BakingPlan plan={calc.bakingPlan} />
                                        <div className="info-note">
                                            <strong>Indicador de cocción:</strong> {doughType === 'pizza'
                                                ? 'cornicione bien dorado y con leoparding (manchas oscuras).'
                                                : 'corteza color caoba profundo, base que suena hueca al golpear, temperatura interna 96-99°C.'}
                                        </div>
                                    </div>
                                )}

                                <div className="info-note" style={{marginTop: '1rem'}}>
                                    <strong>Nota:</strong> Esta calculadora es una guía. La fuerza real de la harina, la actividad de tu levadura y la humedad ambiente pueden variar los tiempos. Aprende a leer la masa: doblada, jiggly, llena de burbujas en superficie y al menos al 70% de su volumen inicial.
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* TOAST */}
                    {toast && <div className="toast"><Icon name="check" size={16}/> {toast}</div>}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <div id="cookie-consent-banner">
        <p>
            Uso cookies de Google Analytics para ver estadísticas anónimas. Como es una web personal, no uso estos datos para publicidad.
            Más en mi <a href="/politica-de-privacidad">Política de Privacidad</a>.
        </p>
        <div class="cookie-btns">
            <button id="btn-reject-cookies" class="cookie-btn btn-reject">Rechazar</button>
            <button id="btn-accept-cookies" class="cookie-btn btn-accept">Aceptar</button>
        </div>
    </div>

    <script>
        const GA_MEASUREMENT_ID = 'G-EVTE774402';
        function loadGoogleAnalytics() {
            var s = document.createElement('script');
            s.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
            s.async = true;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GA_MEASUREMENT_ID);
        }
        window.addEventListener('load', function() {
            const consent = localStorage.getItem('userConsent');
            if (consent === 'accepted') loadGoogleAnalytics();
            else if (!consent) document.getElementById('cookie-consent-banner').style.display = 'block';
        });
        document.getElementById('btn-accept-cookies').addEventListener('click', function() {
            localStorage.setItem('userConsent', 'accepted');
            document.getElementById('cookie-consent-banner').style.display = 'none';
            loadGoogleAnalytics();
        });
        document.getElementById('btn-reject-cookies').addEventListener('click', function() {
            localStorage.setItem('userConsent', 'rejected');
            document.getElementById('cookie-consent-banner').style.display = 'none';
        });
    </script>
</body>
</html>
