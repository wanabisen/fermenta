                lines.push('\n━━━ FASE 4 · SEGUNDO IMPASTO (DOMINGO MAÑANA) ━━━');
                impasto2.forEach(i => {
                    lines.push(`  ${i.name}: ${round(i.g, 1)}g${i.note ? ' (' + i.note + ')' : ''}`);
                });
                lines.push(`  Total añadido: ${round(impasto2Total, 0)}g`);
                lines.push('  Temperatura ideal: 24-26°C · test de membrana translúcida');

                lines.push('\n━━━ FASE 6 · HORNEADO ━━━');
                lines.push(`  Temperatura: ${moldData.bakeTemp}°C`);
                lines.push(`  Tiempo: ${moldData.bakeMin}-${moldData.bakeMax} min`);
                lines.push('  Sonda interna: 92°C');
                lines.push('  VOLTEO INMEDIATO al salir · Enfriar 12h boca abajo');

                return lines.join('\n');
            };

            const copyAll = () => {
                navigator.clipboard?.writeText(buildText()).then(() => showToast('Receta copiada ✓'));
            };

            const downloadAll = () => {
                const blob = new Blob([buildText()], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                { id: 'prep_naranja',   day: 'Jueves',  text: 'Naranja confitada hecha y secando en rejilla' },

                                        <tr><td style={{color: 'var(--text-soft)', fontWeight: 600}}>~21:30</td><td>Forma rulo apretado en film, pínchalo. Espera a que se hinche y se ponga DURO al tacto. Luego nevera hasta el sábado.</td></tr>

                            <div style={{fontFamily: 'Fraunces, serif', fontSize: '1rem', fontWeight: 500, marginBottom: '0.5rem', marginTop: '1rem', color: 'var(--accent)'}}>

                    {/* CHECKLIST TAB */}

                    {/* BAKING TAB */}
                    {activeTab === 'baking' && (
                        <div className="animate-in">

                                        <tr><td>Tipo</td><td className="qty">{moldData.label}</td></tr>

                                        <tr><td>Altura</td><td className="qty">{moldData.height} cm</td></tr>
                                        <tr><td>Carga (crudo)</td><td className="qty">{moldData.loadCrudo}g</td></tr>
                                        <tr><td>Capacidad final</td><td className="qty">{moldData.capacity}g</td></tr>

                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // MAIN APP
        // ============================================================
        // Default values for reset
        const DEFAULTS = {
            doughType: 'pan', flour: 500, pizzaBalls: 4,
            hydration: 70, saltPercent: 2, totalTime: 4,
            temperature: 22, useColdProof: false, coldProofTime: 18,
            prefermentType: 'none', prefermentFlourPercent: 30,
            prefermentTime: 14, prefermentTemp: 20,
        };

        // Load saved state from localStorage
        const loadSaved = () => {
            try {
                const saved = localStorage.getItem('fermCalcState');
                return saved ? { ...DEFAULTS, ...JSON.parse(saved) } : DEFAULTS;
            } catch (e) { return DEFAULTS; }
        };

        const App = () => {
            const [theme, setTheme] = useState(() => {
                if (typeof localStorage !== 'undefined') {
                    return localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                }
                return 'light';
            });
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                if (typeof localStorage !== 'undefined') localStorage.setItem('theme', theme);
            }, [theme]);

            const initial = loadSaved();
            const [doughType, setDoughType]                   = useState(initial.doughType);
            const [flour, setFlour]                           = useState(initial.flour);
            const [pizzaBalls, setPizzaBalls]                 = useState(initial.pizzaBalls);
            const [hydration, setHydration]                   = useState(initial.hydration);
            const [saltPercent, setSaltPercent]               = useState(initial.saltPercent);
            const [totalTime, setTotalTime]                   = useState(initial.totalTime);
            const [temperature, setTemperature]               = useState(initial.temperature);
            const [useColdProof, setUseColdProof]             = useState(initial.useColdProof);
            const [coldProofTime, setColdProofTime]           = useState(initial.coldProofTime);
            const [prefermentType, setPrefermentType]         = useState(initial.prefermentType);
            const [prefermentFlourPercent, setPrefermentFlourPercent] = useState(initial.prefermentFlourPercent);
            const [prefermentTime, setPrefermentTime]         = useState(initial.prefermentTime);
            const [prefermentTemp, setPrefermentTemp]         = useState(initial.prefermentTemp);
            const [activePreset, setActivePreset]             = useState(null);
            const [activeTab, setActiveTab]                   = useState('recipe');
            const [toast, setToast]                           = useState(null);
            const [presetModified, setPresetModified]         = useState(false);
            const [bakeTime, setBakeTime] = useState(() => {
                const t = new Date(); t.setHours(18, 0, 0, 0);
                return t.toTimeString().slice(0, 5);
            });

            // Panettone state
            const [panMold, setPanMold]         = useState(() => {
                try { return localStorage.getItem('panMold') || '500_alto'; } catch(e) { return '500_alto'; }
            });
            const [panUnits, setPanUnits]       = useState(() => {
                try { return parseInt(localStorage.getItem('panUnits')) || 2; } catch(e) { return 2; }
            });
            const [panLiquidStarter, setPanLiquidStarter] = useState(() => {
                try { return localStorage.getItem('panLiquidStarter') === 'true'; } catch(e) { return false; }
            });
            const [panChecks, setPanChecks]     = useState(() => {
                try { return JSON.parse(localStorage.getItem('panChecks') || '{}'); } catch(e) { return {}; }
            });
            const [panBakeDay, setPanBakeDay]   = useState(() => {
                try { return localStorage.getItem('panBakeDay') || 'sunday'; } catch(e) { return 'sunday'; }
            });

            // Focaccia state
            const [focStarter, setFocStarter]   = useState(() => {
                try { return localStorage.getItem('focStarter') || 'masa_madre'; } catch(e) { return 'masa_madre'; }
            });
            const [focWeight, setFocWeight]     = useState(() => {
                try { return parseInt(localStorage.getItem('focWeight')) || 990; } catch(e) { return 990; }
            });
            const [focAmbient, setFocAmbient]   = useState(() => {
                try { return parseInt(localStorage.getItem('focAmbient')) || 22; } catch(e) { return 22; }
            });
            const [focBakeTime, setFocBakeTime] = useState(() => {
                try { return localStorage.getItem('focBakeTime') || '13:00'; } catch(e) { return '13:00'; }
            });

            // Gofres state
            const [gofUnits, setGofUnits]         = useState(() => {
                try { return parseInt(localStorage.getItem('gofUnits')) || 13; } catch(e) { return 13; }
            });
            const [gofColdHours, setGofColdHours] = useState(() => {
                try { return parseFloat(localStorage.getItem('gofColdHours')) || 4; } catch(e) { return 4; }
            });
            const [gofReadyTime, setGofReadyTime] = useState(() => {
                try { return localStorage.getItem('gofReadyTime') || '17:30'; } catch(e) { return '17:30'; }
            });

            // Pizza topping counts (per variant)
            const [pizzaToppingCounts, setPizzaToppingCounts] = useState(() => {
                try {
                    const saved = localStorage.getItem('pizzaToppingCounts');
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
                // Default: 3 marghe, 2 diavola, 2 speck_gorgonzola, 2 pollo_maiz, 1 marinara, 1 quattro, 1 bianca, 0 capricciosa
                return {
                    margherita: 3, marinara: 1, diavola: 2,
                    speck_gorgonzola: 2, quattro_formaggi: 1,
                    pollo_maiz: 2, bianca_speck: 1, capricciosa: 0,
                    cacio_pepe: 0,
                };
            });

            useEffect(() => {
                try {
                    localStorage.setItem('panMold', panMold);
                    localStorage.setItem('panUnits', String(panUnits));
                    localStorage.setItem('panLiquidStarter', String(panLiquidStarter));
                    localStorage.setItem('panChecks', JSON.stringify(panChecks));
                    localStorage.setItem('panBakeDay', panBakeDay);
                    localStorage.setItem('focStarter', focStarter);
                    localStorage.setItem('focWeight', String(focWeight));
                    localStorage.setItem('focAmbient', String(focAmbient));
                    localStorage.setItem('focBakeTime', focBakeTime);
                    localStorage.setItem('gofUnits', String(gofUnits));
                    localStorage.setItem('gofColdHours', String(gofColdHours));
                    localStorage.setItem('gofReadyTime', gofReadyTime);
                    localStorage.setItem('pizzaToppingCounts', JSON.stringify(pizzaToppingCounts));
                } catch(e) {}
            }, [panMold, panUnits, panLiquidStarter, panChecks, panBakeDay, focStarter, focWeight, focAmbient, focBakeTime, gofUnits, gofColdHours, gofReadyTime, pizzaToppingCounts]);

            const togglePanCheck = (id) => {
                setPanChecks(prev => ({ ...prev, [id]: !prev[id] }));
            };

            // Show toast helper
            const showToast = useCallback((msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2200);
            }, []);

            // Persist state to localStorage
            useEffect(() => {
                try {
                    localStorage.setItem('fermCalcState', JSON.stringify({
                        doughType, flour, pizzaBalls, hydration, saltPercent, totalTime,
                        temperature, useColdProof, coldProofTime, prefermentType,
                        prefermentFlourPercent, prefermentTime, prefermentTemp
                    }));
                } catch (e) {}
            }, [doughType, flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp]);

            // Reset to defaults
            const resetAll = () => {
                if (!window.confirm('¿Restablecer todos los parámetros a los valores por defecto?')) return;
                Object.entries(DEFAULTS).forEach(([k, v]) => {
                    const setter = {
                        doughType: setDoughType, flour: setFlour, pizzaBalls: setPizzaBalls,
                        hydration: setHydration, saltPercent: setSaltPercent, totalTime: setTotalTime,
                        temperature: setTemperature, useColdProof: setUseColdProof,
                        coldProofTime: setColdProofTime, prefermentType: setPrefermentType,
                        prefermentFlourPercent: setPrefermentFlourPercent,
                        prefermentTime: setPrefermentTime, prefermentTemp: setPrefermentTemp
                    }[k];
                    if (setter) setter(v);
                });
                setActivePreset(null);
                setPresetModified(false);
                showToast('Valores restablecidos');
            };

            const DOUGHBALL_WEIGHT = 260;
            // AVPN standard values — not exposed as sliders for pizza
            const PIZZA_HYDRATION = 65;
            const PIZZA_SALT = 2.8;

            const applyPreset = useCallback((preset) => {
                const c = preset.config;
                if (c.doughType !== undefined) setDoughType(c.doughType);
                if (c.flour !== undefined) setFlour(c.flour);
                if (c.pizzaBalls !== undefined) setPizzaBalls(c.pizzaBalls);
                if (c.hydration !== undefined) setHydration(c.hydration);
                if (c.saltPercent !== undefined) setSaltPercent(c.saltPercent);
                if (c.totalTime !== undefined) setTotalTime(c.totalTime);
                if (c.temperature !== undefined) setTemperature(c.temperature);
                setUseColdProof(c.useColdProof || false);
                if (c.coldProofTime !== undefined) setColdProofTime(c.coldProofTime);
                setPrefermentType(c.prefermentType || 'none');
                if (c.prefermentFlourPercent !== undefined) setPrefermentFlourPercent(c.prefermentFlourPercent);
                if (c.prefermentTime !== undefined) setPrefermentTime(c.prefermentTime);
                if (c.prefermentTemp !== undefined) setPrefermentTemp(c.prefermentTemp);
                setTimeout(() => {
                    setActivePreset(preset.id);
                    setPresetModified(false);
                }, 0);
                showToast(`Aplicado: ${preset.name}`);
            }, [showToast]);

            useEffect(() => {
                if (activePreset) {
                    // Check if current state matches the preset
                    const preset = PRESETS.find(p => p.id === activePreset);
                    if (preset) {
                        const c = preset.config;
                        const matches =
                            (c.doughType === undefined || c.doughType === doughType) &&
                            (c.flour === undefined || c.flour === flour) &&
                            (c.pizzaBalls === undefined || c.pizzaBalls === pizzaBalls) &&
                            (c.hydration === undefined || c.hydration === hydration) &&
                            (c.saltPercent === undefined || c.saltPercent === saltPercent) &&
                            (c.totalTime === undefined || c.totalTime === totalTime) &&
                            (c.temperature === undefined || c.temperature === temperature) &&
                            ((c.useColdProof || false) === useColdProof) &&
                            (c.coldProofTime === undefined || c.coldProofTime === coldProofTime) &&
                            ((c.prefermentType || 'none') === prefermentType) &&
                            (c.prefermentFlourPercent === undefined || c.prefermentFlourPercent === prefermentFlourPercent) &&
                            (c.prefermentTime === undefined || c.prefermentTime === prefermentTime) &&
                            (c.prefermentTemp === undefined || c.prefermentTemp === prefermentTemp);
                        setPresetModified(!matches);
                    }
                }
            // eslint-disable-next-line
            }, [flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp, doughType]);

            useEffect(() => {
                if (doughType === 'pizza' && hydration > 70) setHydration(62);
            // eslint-disable-next-line
            }, [doughType]);

            // ─── COMPUTATION ─────────────────────────────────────────
            const calc = useMemo(() => {
                // For pizza, always use canonical AVPN values regardless of slider state
                const effHydration = doughType === 'pizza' ? PIZZA_HYDRATION : hydration;
                const effSalt      = doughType === 'pizza' ? PIZZA_SALT      : saltPercent;

                const currentFlour = doughType === 'pan'
                    ? flour
                    : (pizzaBalls * DOUGHBALL_WEIGHT) / ((100 + effHydration + effSalt) / 100);

                const usePref = prefermentType !== 'none';
                const cfg = PREFERMENTS[prefermentType];
                let prefFlour = 0, prefWater = 0, prefYeast = 0;
                let finalFlour = currentFlour;
                let finalWater = currentFlour * (effHydration / 100);

                if (usePref) {
                    prefFlour = currentFlour * (prefermentFlourPercent / 100);
                    prefWater = prefFlour * (cfg.hydration / 100);
                    finalFlour = currentFlour - prefFlour;
                    finalWater = currentFlour * (effHydration / 100) - prefWater;

                    if (!cfg.noYeast && prefermentTime > 0) {
                        let pYP = yeastForTime(prefermentTime, prefermentTemp);
                        pYP = clamp(pYP, 0.02, 1);
                        prefYeast = prefFlour * (pYP / 100);
                    }
                }

                let yeastPercent = 0, ambientH = 0, coldH = 0;
                if (useColdProof) {
                    ambientH = clamp(1.5 / rateFactor(temperature), 0.5, 3);
                    coldH = coldProofTime;
                    yeastPercent = yeastForBulk(ambientH, coldH, temperature);
                } else {
                    ambientH = totalTime;
                    yeastPercent = yeastForTime(totalTime, temperature);
                }
                yeastPercent = clamp(yeastPercent, 0.01, 5);

                if (usePref && !cfg.noYeast) {
                    const prefContribution = (prefermentFlourPercent / 100) * 0.5;
                    yeastPercent = yeastPercent * (1 - prefContribution);
                    yeastPercent = clamp(yeastPercent, 0.01, 5);
                }
                if (usePref && cfg.noYeast) yeastPercent = 0;

                const yeastGrams = finalFlour * (yeastPercent / 100);
                const saltGrams = currentFlour * (effSalt / 100);

                const temperingTime = useColdProof
                    ? (currentFlour <= 750 ? 1.5 : currentFlour <= 1500 ? 2.5 : 3.5) / rateFactor(temperature)
                    : 0;

                const finalProofTime = (1.5 / rateFactor(temperature)) * (useColdProof ? 1.2 : 1);

                const bakingPlan = (() => {
                    if (doughType === 'pizza') return {
                        preheat: { temp: 'Máxima (250-300°C)', time: '45-60 min', notes: 'Imprescindible piedra o acero refractario dentro del horno desde el inicio.' },
                        phases: [{
                            name: 'Cocción rápida',
                            temp: 'Máx.', time: '5-8 min', mode: 'Grill + suelo',
                            action: 'Pizza directa sobre la piedra ardiendo. La cocción es muy rápida: vigila el burbujeo y el dorado del cornicione.'
                        }],
                        cooling: 'Servir al instante para mantener la masa elástica y los bordes crujientes.'
                    };

                    const tf = 1 + ((currentFlour - 500) / 500) * 0.25;

                    if (prefermentType === 'esponja') return {
                        preheat: { temp: '180°C', time: '20 min', notes: 'Temperatura moderada porque las grasas y azúcares aceleran el dorado.' },
                        phases: [{
                            name: 'Horneado completo',
                            temp: '180°C', time: `${Math.round(35 * tf)}-${Math.round(45 * tf)} min`, mode: 'Calor arriba/abajo',
                            action: 'Hornea hasta dorado profundo. Si se dora demasiado por arriba, cubre con papel de aluminio los últimos 10-15 minutos. Tester: 92-95°C de temperatura interna.'
                        }],
                        cooling: 'Enfría completamente sobre rejilla (mínimo 1h) antes de cortar para que la miga asiente.'
                    };

                    const high = hydration > 78;
                    return {
                        preheat: { temp: high ? '250°C' : '240°C', time: '45-60 min', notes: 'Crítico: precalienta con la dutch oven o piedra dentro para acumular calor.' },
                        phases: [
                            {
                                name: 'Salto y expansión (con vapor)',
                                temp: high ? '250°C' : '240°C',
                                time: high ? `${Math.round(20 * tf)}-${Math.round(22 * tf)} min` : `${Math.round(15 * tf)}-${Math.round(20 * tf)} min`,
                                mode: 'Calor arriba/abajo',
                                action: 'Hornea tapado en la dutch oven (o crea vapor con bandeja de hielo). El vapor mantiene la corteza elástica para que el pan rompa por las greñas y suba al máximo.'
                            },
                            {
                                name: 'Corteza y color',
                                temp: high ? '230°C' : '210°C',
                                time: high ? `${Math.round(18 * tf)}-${Math.round(22 * tf)} min` : `${Math.round(20 * tf)}-${Math.round(25 * tf)} min`,
                                mode: 'Calor arriba/abajo',
                                action: 'Destapa o retira la fuente de vapor. La corteza se oscurece y crujifica. Busca un caoba profundo. Temp. interna 96-99°C.'
                            }
                        ],
                        cooling: 'Esencial: mínimo 2h sobre rejilla antes de cortar. La miga sigue cocinándose con el vapor interno y el sabor termina de desarrollarse.'
                    };
                })();

                const totalDough = currentFlour + (currentFlour * effHydration / 100) + saltGrams + yeastGrams + prefYeast;

                return {
                    currentFlour, finalFlour, finalWater, prefFlour, prefWater, prefYeast,
                    yeastPercent, yeastGrams, saltGrams,
                    ambientH, coldH, temperingTime, finalProofTime,
                    bakingPlan, totalDough,
                    effHydration, effSalt,
                };
            }, [doughType, flour, pizzaBalls, hydration, saltPercent, totalTime, temperature, useColdProof, coldProofTime, prefermentType, prefermentFlourPercent, prefermentTime, prefermentTemp]);

            const quality = useQualityCheck({ doughType, hydration, saltPercent, temperature, totalTime, useColdProof, coldProofTime, prefermentType, prefermentTemp });

            // Difficulty score (1-5)
            const difficulty = useMemo(() => {
                let score = 1;
                if (hydration > 75) score++;
                if (hydration > 85) score++;
                if (useColdProof) score++;
                if (prefermentType !== 'none') score++;
                if (prefermentType === 'masa_madre') score++;
                if (doughType === 'pizza') score++;
                return clamp(score, 1, 5);
            }, [hydration, useColdProof, prefermentType, doughType]);
            const difficultyLabel = ['', 'Principiante', 'Fácil', 'Intermedio', 'Avanzado', 'Experto'][difficulty];

            // ─── SCHEDULE ────────────────────────────────────────────
            const schedule = useMemo(() => {
                const [bh, bm] = bakeTime.split(':').map(Number);
                const bake = new Date();
                bake.setHours(bh, bm, 0, 0);
                if (bake < new Date()) bake.setDate(bake.getDate() + 1);

                const events = [];
                events.push({ time: new Date(bake), name: 'Hornear', desc: 'El pan entra al horno precalentado', icon: '🔥', kind: 'bake' });

                let cursor = new Date(bake);
                // Final proof
                cursor = addHours(cursor, -calc.finalProofTime);
                events.push({ time: new Date(cursor), name: 'Levado final', desc: doughType === 'pizza' ? 'Bolea las pizzas y deja reposar' : 'En banneton o molde, hasta ~70% de aumento', icon: '🫓', kind: 'normal', dur: calc.finalProofTime });

                // Bench rest before final proof (only for pan, not pizza)
                if (doughType === 'pan') {
                    const benchRest = 0.4; // ~25 min
                    cursor = addHours(cursor, -benchRest);
                    events.push({ time: new Date(cursor), name: 'Boleado y reposo', desc: 'Preforma, deja relajar 20-30 min, luego forma definitiva', icon: '🤲', kind: 'normal', dur: benchRest });
                }

                if (useColdProof) {
                    if (calc.temperingTime > 0) {
                        cursor = addHours(cursor, -calc.temperingTime);
                        events.push({ time: new Date(cursor), name: 'Atemperar', desc: 'Saca de la nevera, deja que pierda el frío', icon: '☀️', kind: 'normal', dur: calc.temperingTime });
                    }
                    cursor = addHours(cursor, -calc.coldH);
                    events.push({ time: new Date(cursor), name: 'A la nevera', desc: `Retardo en frío a ${FRIDGE_TEMP}°C — desarrolla sabor`, icon: '❄️', kind: 'cold', dur: calc.coldH });

                    // Folds during bulk if hydration is high
                    if (hydration >= 70 && calc.ambientH >= 1) {
                        const foldsCount = hydration >= 80 ? 4 : 3;
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Mezcla + bulk con pliegues', desc: `${foldsCount} pliegues cada 30 min durante la fermentación a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    } else {
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Mezcla y bulk corto', desc: `Fermentación a ${temperature}°C antes del frío`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    }
                } else {
                    // Folds during bulk if hydration is high
                    if (hydration >= 70 && calc.ambientH >= 2) {
                        const foldsCount = hydration >= 80 ? 4 : 3;
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Bulk con pliegues', desc: `${foldsCount} pliegues cada ${Math.round(calc.ambientH * 60 / (foldsCount + 1))} min a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    } else {
                        cursor = addHours(cursor, -calc.ambientH);
                        events.push({ time: new Date(cursor), name: 'Bulk principal', desc: `Fermentación en bloque a ${temperature}°C`, icon: '🥣', kind: 'normal', dur: calc.ambientH });
                    }
                }

                // Autolisis only suggested for high hydration breads
                if (doughType === 'pan' && hydration >= 75) {
                    const autolyse = 0.5;
                    cursor = addHours(cursor, -autolyse);
                    events.push({ time: new Date(cursor), name: 'Autólisis', desc: 'Mezcla harina + agua, deja reposar 30 min antes de añadir sal y levadura', icon: '💧', kind: 'normal', dur: autolyse });
                }

                events.push({ time: new Date(cursor), name: 'Empezar aquí', desc: prefermentType !== 'none' ? 'Mezcla la masa final con el prefermento ya activo' : 'Pesa los ingredientes y comienza', icon: '👐', kind: 'start' });

                if (prefermentType !== 'none') {
                    cursor = addHours(cursor, -prefermentTime);
                    const desc = PREFERMENTS[prefermentType].noYeast
                        ? `${prefermentTime}h a ${prefermentTemp}°C — refresca tu masa madre`
                        : `${prefermentTime}h a ${prefermentTemp}°C en bote tapado`;
                    events.push({ time: new Date(cursor), name: `Preparar ${PREFERMENTS[prefermentType].name}`, desc, icon: '🌿', kind: 'normal', dur: prefermentTime });
                }

                return events.reverse();
            }, [bakeTime, calc, useColdProof, temperature, prefermentType, prefermentTime, prefermentTemp, doughType, hydration]);

            // ─── RECIPE TEXT ─────────────────────────────────────────
            const recipeText = useMemo(() => {
                const lines = [];
                lines.push(`RECETA — ${doughType === 'pizza' ? 'Pizza' : 'Pan'}${prefermentType !== 'none' ? ' con ' + PREFERMENTS[prefermentType].name : ''}`);
                lines.push('═══════════════════════════');
                if (prefermentType !== 'none') {
                    lines.push(`\n${PREFERMENTS[prefermentType].name} (${prefermentTime}h a ${prefermentTemp}°C):`);
                    lines.push(`  Harina: ${round(calc.prefFlour)}g`);
                    lines.push(`  Agua: ${round(calc.prefWater)}g`);
                    if (calc.prefYeast > 0) lines.push(`  Levadura seca: ${round(calc.prefYeast, 2)}g`);
                    if (PREFERMENTS[prefermentType].noYeast) lines.push(`  Masa madre activa: ${round(calc.prefFlour * 0.4)}g aprox`);
                }
                lines.push(`\nMasa final:`);
                lines.push(`  Harina: ${round(calc.finalFlour)}g`);
                lines.push(`  Agua: ${round(calc.finalWater)}g`);
                lines.push(`  Sal: ${round(calc.saltGrams, 1)}g`);
                if (calc.yeastGrams > 0) lines.push(`  Levadura seca: ${round(calc.yeastGrams, 2)}g`);
                lines.push(`\nTotales: ${round(calc.currentFlour)}g harina · ${calc.effHydration}% hidratación · ${calc.effSalt}% sal`);
                lines.push(`\nFermentación:`);
                if (useColdProof) {
                    lines.push(`  • Bulk corto: ${formatHours(calc.ambientH)} a ${temperature}°C`);
                    lines.push(`  • Frío: ${formatHours(calc.coldH)} a ${FRIDGE_TEMP}°C`);
                    if (calc.temperingTime > 0) lines.push(`  • Atemperar: ${formatHours(calc.temperingTime)}`);
                } else {
                    lines.push(`  • Bulk: ${formatHours(calc.ambientH)} a ${temperature}°C`);
                }
                lines.push(`  • Levado final: ${formatHours(calc.finalProofTime)}`);
                return lines.join('\n');
            }, [calc, doughType, prefermentType, prefermentTime, prefermentTemp, hydration, saltPercent, useColdProof, temperature]);

            const copyRecipe = () => {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(recipeText).then(() => {
                        showToast('Receta copiada al portapapeles ✓');
                    }).catch(() => {
                        showToast('Error al copiar');
                    });
                } else {
                    showToast('Portapapeles no disponible');
                }
            };

            const downloadRecipe = () => {
                const blob = new Blob([recipeText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `receta-${doughType}-${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('Receta descargada ✓');
            };

            const totalTimeAll = useMemo(() => {
                let t = calc.finalProofTime;
                if (doughType === 'pan') t += 0.4; // bench rest
                if (useColdProof) {
                    t += calc.ambientH + calc.coldH + calc.temperingTime;
                } else {
                    t += calc.ambientH;
                }
                if (doughType === 'pan' && hydration >= 75) t += 0.5; // autolysis
                if (prefermentType !== 'none') t += prefermentTime;
                return t;
            }, [calc, useColdProof, prefermentType, prefermentTime, doughType, hydration]);

            return (
                <>
                    <header className="app-header">
                        <div className="brand">
                            <div className="brand-mark">F</div>
                            <div className="brand-text">
                                <h1>Calculadora de Fermentación</h1>
                                <p>Panadería artesanal · cálculo asistido</p>
                            </div>
                        </div>
                        <div className="header-actions">
                            <button className="icon-btn" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}
                                title={theme === 'light' ? 'Modo oscuro' : 'Modo claro'}>
                                <Icon name={theme === 'light' ? 'moon' : 'sun'} />
                            </button>
                            {doughType !== 'panettone' && doughType !== 'focaccia' && doughType !== 'gofres' && (
                                <>
                                    <button className="icon-btn" onClick={copyRecipe} title="Copiar receta">
                                        <Icon name="copy" /> <span>Copiar</span>
                                    </button>
                                    <button className="icon-btn" onClick={downloadRecipe} title="Descargar receta como .txt">
                                        <Icon name="download" />
                                    </button>
                                </>
                            )}
                            <button className="icon-btn" onClick={() => window.print()} title="Imprimir">
                                <Icon name="printer" />
                            </button>
                        </div>
                    </header>

                    <div className="app-body">
                        {doughType === 'panettone' ? (
                            <>
                                {/* HERO STRIP — panettone */}
                                <div className="hero-strip">
                                    <div className="hero-stat">
                                        <div className="label">Molde</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>{PANETTONE_MOLDS[panMold].label}</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Unidades</div>
                                        <div className="value">{panUnits}</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Carga total</div>
                                        <div className="value">{Math.round(PANETTONE_MOLDS[panMold].loadCrudo * panUnits)}<span className="unit">g</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Proceso</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>5 días</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Hornea</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>
                                            {panBakeDay === 'sunday' ? 'Domingo' : panBakeDay === 'saturday' ? 'Sábado' : 'Viernes'}
                                        </div>
                                    </div>
                                </div>

                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem'}}>
                                    <div className="difficulty">
                                        <span>Dificultad:</span>
                                        <div className="difficulty-bars">
                                            {[1,2,3,4,5].map(n => (
                                                <span key={n} className={`db on`}></span>
                                            ))}
                                        </div>
                                        <span style={{color: 'var(--text-soft)', fontWeight: 600}}>Experto</span>
                                    </div>
                                    <span style={{fontSize: '0.78rem', color: 'var(--text-soft)', fontStyle: 'italic'}}>
                                        Receta: V. Molina Pitarch · V2.0
                                    </span>
                                </div>
                            </>
                        ) : doughType === 'focaccia' ? (
                            <>
                                {/* HERO STRIP — focaccia */}
                                <div className="hero-strip">
                                    <div className="hero-stat">
                                        <div className="label">Masa total</div>
                                        <div className="value">{focWeight}<span className="unit">g</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Fermento</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>
                                            {focStarter === 'masa_madre' ? '🌾 Madre' : '🍞 Levadura'}
                                        </div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">T° ambiente</div>
                                        <div className="value">{focAmbient}<span className="unit">°C</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Modo</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>
                                            {focAmbient >= 26 ? '🔥 Calor' : '✓ Normal'}
                                        </div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Tiempo total</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>~26h</div>
                                    </div>
                                </div>

                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem'}}>
                                    <div className="difficulty">
                                        <span>Dificultad:</span>
                                        <div className="difficulty-bars">
                                            {[1,2,3,4,5].map(n => (
                                                <span key={n} className={`db ${n <= 2 ? 'on' : ''}`}></span>
                                            ))}
                                        </div>
                                        <span style={{color: 'var(--text-soft)', fontWeight: 600}}>Fácil</span>
                                    </div>
                                    <span style={{fontSize: '0.78rem', color: 'var(--text-soft)', fontStyle: 'italic'}}>
                                        24h en frío · alta hidratación
                                    </span>
                                </div>
                            </>
                        ) : doughType === 'gofres' ? (
                            <>
                                {/* HERO STRIP — gofres */}
                                <div className="hero-strip">
                                    <div className="hero-stat">
                                        <div className="label">Gofres</div>
                                        <div className="value">{gofUnits}</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Masa total</div>
                                        <div className="value">{Math.round(GOFRE_WEIGHT * gofUnits)}<span className="unit">g</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Frío</div>
                                        <div className="value">{gofColdHours}<span className="unit">h</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Personas</div>
                                        <div className="value">~{Math.ceil(gofUnits / 2)}</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Tiempo total</div>
                                        <div className="value" style={{fontSize: '1.3rem'}}>~{formatHours(gofColdHours + 3)}</div>
                                    </div>
                                </div>

                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem'}}>
                                    <div className="difficulty">
                                        <span>Dificultad:</span>
                                        <div className="difficulty-bars">
                                            {[1,2,3,4,5].map(n => (
                                                <span key={n} className={`db ${n <= 2 ? 'on' : ''}`}></span>
                                            ))}
                                        </div>
                                        <span style={{color: 'var(--text-soft)', fontWeight: 600}}>Fácil</span>
                                    </div>
                                    <span style={{fontSize: '0.78rem', color: 'var(--text-soft)', fontStyle: 'italic'}}>
                                        Masa fermentada · perlas de azúcar
                                    </span>
                                </div>
                            </>
                        ) : (
                            <>
                                {/* HERO STRIP */}
                                <div className="hero-strip">
                                    <div className="hero-stat">
                                        <div className="label">Harina total</div>
                                        <div className="value">{Math.round(calc.currentFlour)}<span className="unit">g</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Hidratación</div>
                                        <div className="value">{calc.effHydration}<span className="unit">%</span></div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Levadura</div>
                                        <div className="value">
                                            {calc.yeastGrams > 0 ? round(calc.yeastGrams, 2) : '—'}
                                            {calc.yeastGrams > 0 && <span className="unit">g</span>}
                                        </div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Tiempo total</div>
                                        <div className="value">{formatHours(totalTimeAll)}</div>
                                    </div>
                                    <div className="hero-stat">
                                        <div className="label">Masa total</div>
                                        <div className="value">{Math.round(calc.totalDough)}<span className="unit">g</span></div>
                                    </div>
                                </div>

                                {/* DIFFICULTY + RESET */}
                                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.75rem'}}>
                                    <div className="difficulty">
                                        <span>Dificultad:</span>
                                        <div className="difficulty-bars">
                                            {[1,2,3,4,5].map(n => (
                                                <span key={n} className={`db ${n <= difficulty ? 'on' : ''}`}></span>
                                            ))}
                                        </div>
                                        <span style={{color: 'var(--text-soft)', fontWeight: 600}}>{difficultyLabel}</span>
                                    </div>
                                    <button className="reset-link" onClick={resetAll}>↻ Restablecer valores</button>
                                </div>

                                {/* PRESETS */}
                                <div className="presets-row">
                                    {PRESETS.map(p => (
                                        <button key={p.id}
                                            className={`preset-btn ${activePreset === p.id ? 'active' : ''}`}
                                            onClick={() => applyPreset(p)}>
                                            {p.name}
                                            {activePreset === p.id && presetModified && (
                                                <span className="modified-badge">modif.</span>
                                            )}
                                        </button>
                                    ))}
                                </div>
                            </>
                        )}

                        <div className="two-col">
                            {/* ─── LEFT: CONTROLS ─── */}
                            <div className="card">
                                {/* Tipo de masa */}
                                <div className="section">
                                    <div className="section-label"><span className="step-num">1</span> Tipo de masa</div>
                                    <div className="dough-toggle">
                                        <button className={`dough-btn ${doughType === 'pan' ? 'active' : ''}`}
                                            onClick={() => setDoughType('pan')}>
                                            <span className="top"><span className="emoji">🍞</span> Pan</span>
                                            <span className="sub">Hogazas y baguettes</span>
                                        </button>
                                        <button className={`dough-btn ${doughType === 'pizza' ? 'active' : ''}`}
                                            onClick={() => setDoughType('pizza')}>
                                            <span className="top"><span className="emoji">🍕</span> Pizza</span>
                                            <span className="sub">Napolitana, 260g</span>
                                        </button>
                                        <button className={`dough-btn ${doughType === 'focaccia' ? 'active' : ''}`}
                                            onClick={() => setDoughType('focaccia')}>
                                            <span className="top"><span className="emoji">🫓</span> Focaccia</span>
                                            <span className="sub">Alta hidratación · 24h</span>
                                        </button>
                                        <button className={`dough-btn ${doughType === 'gofres' ? 'active' : ''}`}
                                            onClick={() => setDoughType('gofres')}>
                                            <span className="top"><span className="emoji">🧇</span> Gofres</span>
                                            <span className="sub">Lieja · perlas azúcar</span>
                                        </button>
                                        <button className={`dough-btn ${doughType === 'panettone' ? 'active' : ''}`}
                                            onClick={() => setDoughType('panettone')}>
                                            <span className="top"><span className="emoji">🎄</span> Panettone</span>
                                            <span className="sub">Chocolate · 5 días</span>
                                        </button>
                                    </div>
                                </div>

                                {/* ═══ PANETTONE BRANCH ═══ */}
                                {doughType === 'panettone' && (
                                    <>
                                        {/* Molde */}
                                        <div className="section">
                                            <div className="section-label"><span className="step-num">2</span> Molde</div>
                                            <div className="pan-grid">
                                                {Object.entries(PANETTONE_MOLDS).map(([k, m]) => (
                                                    <button key={k}
                                                        className={`pan-mold-btn ${panMold === k ? 'active' : ''}`}
                                                        onClick={() => setPanMold(k)}>
                                                        <span style={{fontWeight: 600}}>{m.label}</span>
                                                        <span className="ms">Ø{m.diameter} · {m.height}cm</span>
                                                    </button>
                                                ))}
                                            </div>
                                            <div style={{fontSize: '0.78rem', color: 'var(--text-soft)', fontStyle: 'italic', marginTop: '0.4rem'}}>
                                                {PANETTONE_MOLDS[panMold].note} · carga: {PANETTONE_MOLDS[panMold].loadCrudo}g por unidad
                                            </div>
                                        </div>

                                        {/* Unidades */}
                                        <div className="section">
                                            <div className="section-label"><span className="step-num">3</span> Cantidad</div>
                                            <Slider label="Número de panettones" icon="🎄"
                                                value={panUnits} onChange={setPanUnits}
                                                min="1" max="10" step="1" unit={panUnits === 1 ? 'unidad' : 'unidades'}

                                                        <div style={{fontSize: '0.65rem', color: 'var(--text-muted)', fontWeight: 400, fontFamily: 'Inter'}}>
                                                            {formatDay(ev.time, schedule[schedule.length-1].time)}
                                                        </div>
                                                    </div>
                                                    <div className="schedule-step">
                                                        <div className="name">
                                                            <span className="ic">{ev.icon}</span>
                                                            {ev.name}
                                                        </div>
                                                        <div className="desc">{ev.desc}</div>
                                                    </div>
                                                    <div className="schedule-duration">
                                                        {ev.dur ? formatHours(ev.dur) : ''}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="info-note">
                                            <strong>Cronograma calculado hacia atrás</strong> desde tu hora de horneado.
                                            Ajusta la hora arriba para ver cuándo empezar.
                                        </div>
                                    </div>
                                )}

                                {/* BAKING TAB */}
                                {activeTab === 'baking' && (
                                    <div className="animate-in">
                                        <BakingPlan plan={calc.bakingPlan} />
                                        <div className="info-note">
                                            <strong>Indicador de cocción:</strong> {doughType === 'pizza'
                                                ? 'cornicione bien dorado y con leoparding (manchas oscuras).'
                                                : 'corteza color caoba profundo, base que suena hueca al golpear, temperatura interna 96-99°C.'}
                                        </div>
                                    </div>
                                )}

                                {/* TOPPINGS TAB (pizza only) */}
                                {activeTab === 'toppings' && doughType === 'pizza' && (
                                    <PizzaToppings
                                        counts={pizzaToppingCounts}
                                        setCounts={setPizzaToppingCounts}
                                        maxPizzas={pizzaBalls}
                                        showToast={showToast}
                                    />
                                )}

                                <div className="info-note" style={{marginTop: '1rem'}}>
                                    <strong>Nota:</strong> Esta calculadora es una guía. La fuerza real de la harina, la actividad de tu levadura y la humedad ambiente pueden variar los tiempos. Aprende a leer la masa: doblada, jiggly, llena de burbujas en superficie y al menos al 70% de su volumen inicial.
                                </div>
                                </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* TOAST */}
                    {toast && <div className="toast"><Icon name="check" size={16}/> {toast}</div>}
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <div id="cookie-consent-banner">
        <p>
            Uso cookies de Google Analytics para ver estadísticas anónimas. Como es una web personal, no uso estos datos para publicidad.
            Más en mi <a href="/politica-de-privacidad">Política de Privacidad</a>.
        </p>
        <div class="cookie-btns">
            <button id="btn-reject-cookies" class="cookie-btn btn-reject">Rechazar</button>
            <button id="btn-accept-cookies" class="cookie-btn btn-accept">Aceptar</button>
        </div>
    </div>

    <script>
        const GA_MEASUREMENT_ID = 'G-EVTE774402';
        function loadGoogleAnalytics() {
            var s = document.createElement('script');
            s.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
            s.async = true;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GA_MEASUREMENT_ID);
        }
        window.addEventListener('load', function() {
            const consent = localStorage.getItem('userConsent');
            if (consent === 'accepted') loadGoogleAnalytics();
            else if (!consent) document.getElementById('cookie-consent-banner').style.display = 'block';
        });
        document.getElementById('btn-accept-cookies').addEventListener('click', function() {
            localStorage.setItem('userConsent', 'accepted');
            document.getElementById('cookie-consent-banner').style.display = 'none';
            loadGoogleAnalytics();
        });
        document.getElementById('btn-reject-cookies').addEventListener('click', function() {
            localStorage.setItem('userConsent', 'rejected');
            document.getElementById('cookie-consent-banner').style.display = 'none';
        });
    </script>
</body>
</html>
